<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Import Excel</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<h2>Upload Excel File</h2>

<input type="file" id="upload">

<script>

function cleanText(text){
  if(!text) return "";
  return text
    .replace(/□/g,"'")
    .replace(/\(\.\.\.\)/g,"")
    .replace(/\.{2,}/g,"")
    .replace(/;/g,"")
    .replace(/\s+/g," ")
    .replace(/[\r\n]+/g," ")
    .trim();
}

document.getElementById("upload").addEventListener("change", function(e){

  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function(evt){

    let data = new Uint8Array(evt.target.result);
    let wb = XLSX.read(data, {type:"array"});
    let ws = wb.Sheets[wb.SheetNames[0]];

    let json = XLSX.utils.sheet_to_json(ws);

    let cleaned = json.map(r => ({

      issue: cleanText(r["Issue"]),
      type: cleanText(r["Type of Issue"]),
      description: cleanText(r["Issue Description"]),
      rationale: cleanText(r["Rationale"]),
      suggestion: cleanText(r["Suggestion"]),
      severity: cleanText(r["Severity"]),
      wcagLevel: cleanText(r["WCAG Level"] || r["WCAG 2.0 Conformance Level"]),
      wcagSC: cleanText(r["WCAG SC"] || r["WCAG 2.0"])

    }));

    localStorage.setItem("repoData", JSON.stringify(cleaned));

    alert("✅ Data imported successfully");

  };

  reader.readAsArrayBuffer(file);

});

</script>

</body>
</html>
