<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Import Excel</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<h2>Upload Excel File</h2>

<input type="file" id="upload">

<script>

/* ✅ SAFE CLEAN TEXT (FINAL FIX) */
function cleanText(text){

  if(text === undefined || text === null) return "";

  // ✅ Convert anything to string FIRST (CRITICAL FIX)
  text = String(text);

  return text
    .replace(/□/g,"'")
    .replace(/\(\.\.\.\)/g,"")
    .replace(/\.{2,}/g,"")
    .replace(/;/g,"")
    .replace(/\s+/g," ")
    .replace(/[\r\n]+/g," ")
    .trim();
}

/* ✅ NORMALIZE KEYS */
function normalizeRow(row){

  let newRow = {};

  Object.keys(row).forEach(key => {

    let cleanKey = key
      .toLowerCase()
      .replace(/[\r\n]+/g," ")
      .replace(/\s+/g," ")
      .trim();

    newRow[cleanKey] = row[key];
  });

  return newRow;
}

document.getElementById("upload").addEventListener("change", function(e){

  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function(evt){

    let data = new Uint8Array(evt.target.result);
    let wb = XLSX.read(data, {type:"array"});
    let ws = wb.Sheets[wb.SheetNames[0]];

    let json = XLSX.utils.sheet_to_json(ws);

    let cleaned = json.map(r => {

      let row = normalizeRow(r);

      return {

        issue: cleanText(row["issue"]),
        type: cleanText(row["type of issue"]),

        description: cleanText(row["issue description"]),
        rationale: cleanText(row["rationale"]),

        suggestion: cleanText(row["suggestion"]),
        severity: cleanText(row["severity"]),

        wcagLevel: cleanText(row["wcag 2.0 conformance level"]),
        wcagSC: cleanText(row["wcag 2.0 success criteria"])

      };
    });

    localStorage.setItem("repoData", JSON.stringify(cleaned));

    alert("✅ Data imported successfully");

  };

  reader.readAsArrayBuffer(file);

});
  
/* ✅ SAFE HTML ESCAPE (FINAL FIX) */
function escapeHTML(text){

  if(!text) return "";

  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

</script>

</body>
</html>
