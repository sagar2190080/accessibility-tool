<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Import Excel</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<h2>Upload Excel File</h2>

<input type="file" id="upload">

<script>

/* ✅ CLEAN TEXT */
function cleanText(text){
  if(!text) return "";

  return text
    .replace(/□/g,"'")
    .replace(/\(\.\.\.\)/g,"")
    .replace(/\.{2,}/g,"")
    .replace(/;/g,"")
    .replace(/\s+/g," ")
    .replace(/[\r\n]+/g," ")
    .trim();
}

/* ✅ SMART COLUMN FINDER (FINAL FIX) */
function getValue(row, keyword){
  let keys = Object.keys(row);

  for(let k of keys){
    let normalized = k.toLowerCase().trim();

    if(normalized.includes(keyword.toLowerCase())){
      return row[k];
    }
  }

  return "";
}

document.getElementById("upload").addEventListener("change", function(e){

  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function(evt){

    let data = new Uint8Array(evt.target.result);
    let wb = XLSX.read(data, {type:"array"});
    let ws = wb.Sheets[wb.SheetNames[0]];

    let json = XLSX.utils.sheet_to_json(ws);

    let cleaned = json.map(r => ({

      issue: cleanText(getValue(r,"issue")),
      type: cleanText(getValue(r,"type")),

      description: cleanText(getValue(r,"description")),
      rationale: cleanText(getValue(r,"rationale")),

      suggestion: cleanText(getValue(r,"suggestion")),
      severity: cleanText(getValue(r,"severity")),

      wcagLevel: cleanText(getValue(r,"conformance")),
      wcagSC: cleanText(getValue(r,"criteria"))

    }));

    localStorage.setItem("repoData", JSON.stringify(cleaned));

    alert("✅ Data imported successfully (FINAL FIX APPLIED)");

  };

  reader.readAsArrayBuffer(file);

});

</script>

</body>
</html>
