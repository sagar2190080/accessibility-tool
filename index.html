<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
body{
  margin:0;
  font-family:"Segoe UI";
  background:#eef1f5;
}

.wrapper{ display:flex; height:100vh; }

/* LEFT */
.left{
  width:28%;
  background:white;
  border-right:1px solid #ddd;
  position:relative;
  overflow:auto;
}

.search{
  padding:10px;
}

.search input{
  width:100%;
  padding:8px;
}

/* suggestions */
#suggestions{
  position:absolute;
  top:50px;
  left:10px;
  width:90%;
  background:white;
  border:1px solid #ddd;
  max-height:200px;
  overflow:auto;
  display:none;
  z-index:10;
}

.suggestion-item{
  padding:8px;
  cursor:pointer;
}
.suggestion-item:hover{
  background:#eef1ff;
}

/* list */
.card{
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.card.active{
  background:#e9efff;
  border-left:4px solid #2f56d3;
}

.card:focus {
  outline: 2px solid #2f56d3;
  outline-offset: -2px;
}

.card:focus-visible {
  outline: 2px solid #2f56d3;
}


/* RIGHT */
.right{ width:72%; background:white; }

.title{ padding:15px; font-size:20px; font-weight:600; }

.tabs{ display:flex; border-bottom:1px solid #ddd; }

.tab{
  padding:10px;
  cursor:pointer;
}
.tab.active{
  border-bottom:3px solid #2f56d3;
  font-weight:600;
}

.content{
  padding:18px;
  line-height:1.6;
}

pre{
  background:#f8f9fa;
  border:1px solid #ddd;
  padding:12px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- LEFT -->
<div class="left">

  <div class="search" style="position:relative;">

  <input
    id="searchBox"
    placeholder="Search issues..."
  >

  <button
    id="clearSearch"
    style="
      position:absolute;
      right:18px;
      top:50%;
      transform:translateY(-50%);
      border:none;
      background:none;
      font-size:18px;
      cursor:pointer;
      display:none;
      color:#666;
    ">
    ✕
  </button>

</div>

  <div id="suggestions"></div>
  <div
  id="resultList"
  role="listbox"
  aria-label="Accessibility Issues">
</div>

</div>

<!-- RIGHT -->
<div class="right" id="previewPanel">
  <h3 style="padding:20px">Select an issue</h3>
</div>

</div>

<script>

/* ✅ FIXED DATA LOADING (DOUBLE PARSE) */
let raw = localStorage.getItem("repoData") || "[]";
let temp = JSON.parse(raw);

let issues = temp.map(item => {
  try{
    return typeof item === "string" ? JSON.parse(item) : item;
  }catch(e){
    return item;
  }
});


/* STATE */
let current = {};
let currentIndex = 0;

/* Search Suggestions */
let selectedSuggestionIndex = -1;

/* INIT */
if(issues.length){
  renderList(issues);
  showDetails(issues[0]);
}

/* ✅ LIST */
function renderList(list){

  resultList.innerHTML = "";

  if(list.length === 0){
    resultList.innerHTML = "<p style='padding:10px;'>No results</p>";
    return;
  }

  list.forEach((i,index)=>{

    let d = document.createElement("div");

d.className = "card";

d.innerHTML = `
    <div>${i.issue}</div>

    <div style="margin-top:6px;">

        <span style="
            background:#e8f0fe;
            color:#1a56db;
            padding:2px 8px;
            border-radius:12px;
            font-size:11px;
            margin-right:4px;
        ">
            ${i.type || ""}
        </span>

        <span style="
            background:#fde8e8;
            color:#c81e1e;
            padding:2px 8px;
            border-radius:12px;
            font-size:11px;
            margin-right:4px;
        ">
            ${i.severity || ""}
        </span>

        <span style="
            background:#f3e8ff;
            color:#6b21a8;
            padding:2px 8px;
            border-radius:12px;
            font-size:11px;
            margin-right:4px;
        ">
            SC ${i.wcagSC || ""}
        </span>

        <span style="
            background:#ecfdf3;
            color:#047857;
            padding:2px 8px;
            border-radius:12px;
            font-size:11px;
        ">
            Level ${i.wcagLevel || ""}
        </span>

    </div>
`;
d.setAttribute("role", "option");
d.setAttribute("tabindex", index === currentIndex ? "0" : "-1");
d.setAttribute(
  "aria-selected",
  index === currentIndex ? "true" : "false"
);
   

    if(index === currentIndex){
    d.classList.add("active");
}

    d.onclick = ()=>{
  currentIndex = index;
  renderList(list);
  showDetails(i);

  const activeCard =
    document.querySelector(".card.active");

  if(activeCard){
    activeCard.focus();
  }
};

    resultList.appendChild(d);
  });
}

/* ✅ DETAILS */
function showDetails(i){

  current = i;

  previewPanel.innerHTML = `
    <div class="title">${i.issue}</div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab(event,'desc')">Description</div>
      <div class="tab" onclick="switchTab(event,'impact')">User Impact</div>
      <div class="tab" onclick="switchTab(event,'rec')">Recommendations</div>
    </div>

    <div class="content" id="contentArea">
      ${formatText(i.description)}
    </div>
  `;
  applyHighlight();
}
/* keyboard navigation */
function moveSelection(list, newIndex){

    if(!list.length) return;

    if(newIndex < 0){
        newIndex = 0;
    }

    if(newIndex >= list.length){
        newIndex = list.length - 1;
    }

    currentIndex = newIndex;

    renderList(list);
    showDetails(list[currentIndex]);

    setTimeout(() => {

        const cards =
            document.querySelectorAll(".card");

        if(cards[currentIndex]){
            cards[currentIndex].focus();
        }

    }, 0);
}
/* ✅ SWITCH TABS */
function switchTab(e,type){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  e.target.classList.add("active");

  let content = "";

  if(type==="desc") content = formatText(current.description);
  if(type==="impact") content = formatText(current.rationale);
  if(type==="rec") content = formatText(current.suggestion);

  
document.getElementById("contentArea").innerHTML = content;
applyHighlight();

}

/* ✅ ✅ FINAL FORMATTER (FIXED) */
const MAX_CODE_BLOCKS = 1;
/*
====================================
SPRINT 2 ENHANCEMENT

Support:

Text

Code Block A

More Text

Code Block B

Current formatter supports:
Text + Single Code Block

====================================
*/
function formatText(text){

    if(!text) return "<p>-</p>";

    let input = String(text).trim();

    /* NEW: Handle explicit Code Snippet marker */
    if(/Code Snippet:/i.test(input)){

        let parts = input.split(/Code Snippet:/i);

        return `
            <p>${escapeText(parts[0].trim())}</p>

            <h4 style="margin-top:20px;">Code Example</h4>

            <pre>
<code class="language-html">
${escapeHTML(formatHTML(parts[1].trim()))}
</code>
            </pre>
        `;
    }

    let codeStart = findActualCodeStart(input);
if(codeStart !== -1){

    let codeSection =
        input.substring(codeStart);

    if(isInlineReference(codeSection)){
        codeStart = -1;
    }
}

    if(codeStart === -1){

    let formattedText =
        escapeText(input)
            .replace(/([:;.])\s*•/g, "$1<br>• ")
            .replace(/\s*•\s*/g, "<br>• ");

    return `
       <div>${formattedText}</div>
    `;
}

    let recommendationText =
        input.substring(0, codeStart).trim();

    let codeSnippet =
        input.substring(codeStart).trim();

    return `
        <p>${escapeText(recommendationText)}</p>

        <h4 style="margin-top:20px;">Code Example</h4>

        <pre>
<code class="language-html">
${escapeHTML(formatHTML(codeSnippet))}
</code>
        </pre>
    `;
}
function findActualCodeStart(text){

    const htmlRegex =
    /(&lt;|<)[a-z][a-z0-9-]*\s+[^>]*(class|id|name|type|href|src|role|aria-)[^>]*(&gt;|>)/ig;

    let match;
    let bestIndex = -1;

    while((match = htmlRegex.exec(text)) !== null){

        let candidateIndex = match.index;

        let remainingText =
            text.substring(candidateIndex);

        let tagCount =
            (
                remainingText.match(
                    /(&lt;\/?[a-z][^&gt;]*&gt;|<\/?[a-z][^>]*>)/ig
                ) || []
            ).length;

        if(tagCount >= 2){

            bestIndex = candidateIndex;
            break;
        }
    }

    return bestIndex;
}


function isInlineReference(text){

    let tagCount =
        (
            text.match(
                /(&lt;\/?[a-z][^&gt;]*&gt;|<\/?[a-z][^>]*>)/ig
            ) || []
        ).length;

    return tagCount <= 1;
}

function formatHTML(html){

    return html
        .replace(/>\s*</g, ">\n<")
        .replace(/\n{2,}/g,"\n")
        .trim();
}

function escapeHTML(text){

    return String(text)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

function escapeText(text){

    return String(text)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        
}
/* ✅ SEARCH */
searchBox.addEventListener("input", function(){

  let q = this.value.toLowerCase();
  clearSearch.style.display =
    this.value.trim()
        ? "block"
        : "none";

  if(!q){
    renderList(issues);
    suggestions.style.display="none";
    return;
  }

let matches = issues.filter(i => {

    let level =
        (i.wcagLevel || "").toLowerCase();

    // Exact WCAG Level match
    if(
        q === "level a" ||
        q === "level aa" ||
        q === "best practice"
    ){
        return level === q.replace("level ","");
    }

    return (
        (
            (i.issue || "") +
            (i.description || "") +
            (i.rationale || "") +
            (i.suggestion || "") +
            (i.type || "") +
            (i.severity || "") +
            (i.wcagSC || "") +
            ("level " + (i.wcagLevel || ""))
        )
        .toLowerCase()
        .includes(q)
    );

});
currentIndex = 0;
  renderList(matches);
  showSuggestions(matches);
});

searchBox.addEventListener("keydown", function(e){

    if(e.key === "Escape"){

        suggestions.style.display = "none";

        searchBox.blur(); // optional
    }

});
clearSearch.addEventListener("click", function(){

    searchBox.value = "";

    clearSearch.style.display = "none";

    suggestions.style.display = "none";

    currentIndex = 0;

    renderList(issues);

    if(issues.length){
        showDetails(issues[0]);
    }

    searchBox.focus();
});

function auditRepository(){

    let total = issues.length;
    let codeDetected = 0;
    let noCodeDetected = 0;

    const report = [];

    issues.forEach(item => {

        const content =
            item.suggestion ||
            item.description ||
            "";

        const codeStart =
            findActualCodeStart(content);

        const detected =
            codeStart !== -1;

        if(detected){
            codeDetected++;
        }else{
            noCodeDetected++;
        }

        report.push({
            issue: item.issue,
            detected,
            codeStart
        });

    });

    console.table(report);

    console.log("Total Records:", total);
    console.log("Code Detected:", codeDetected);
    console.log("No Code:", noCodeDetected);

    return report;
}
document.addEventListener("keydown", function(e){
const suggestionsVisible =
    suggestions.style.display === "block";

if(suggestionsVisible){

    const items =
        document.querySelectorAll(
            ".suggestion-item"
        );

    if(!items.length){
        return;
    }

    if(e.key === "ArrowDown"){

        e.preventDefault();

        selectedSuggestionIndex++;

        if(
            selectedSuggestionIndex >= items.length
        ){
            selectedSuggestionIndex = 0;
        }

        items.forEach(i =>
            i.style.background = ""
        );

        items[selectedSuggestionIndex]
            .style.background =
            "#dbeafe";
	
items[selectedSuggestionIndex]

        block: "nearest"
    });

    }

    if(e.key === "ArrowUp"){

        e.preventDefault();

            selectedSuggestionIndex =
                items.length - 1;
        }

        items.forEach(i =>
            i.style.background = ""
        );

            .style.background =
            "#dbeafe";

        return;
    }

    if(
        e.key === "Enter" &&
        selectedSuggestionIndex >= 0
    ){

        e.preventDefault();

        items[selectedSuggestionIndex]
            .click();

        return;
    }
}

    if(suggestions.style.display !== "block" &&
    e.key === "ArrowDown"){
        e.preventDefault();
        moveSelection(
            issues,
            currentIndex + 1
        );
    }

    if(
uggestions.style.display !== "block" &&
    e.key === "ArrowUp"){
        e.preventDefault();
        moveSelection(
            issues,
            currentIndex - 1
        );
    }
});
/* ✅ SUGGESTIONS */
function showSuggestions(list){
selectedSuggestionIndex = -1;
  if(!list.length){
    suggestions.style.display="none";
    return;
  }

  suggestions.innerHTML="";

  list.slice(0,8).forEach(i=>{

    let div = document.createElement("div");
    div.className="suggestion-item";
    div.innerText=i.issue;

    div.onclick = ()=>{
      showDetails(i);
      searchBox.value = i.issue;
      suggestions.style.display="none";
    };

    suggestions.appendChild(div);
  });

  suggestions.style.display="block";
}

/* ✅ CLOSE */
document.addEventListener("click",(e)=>{
  if(!searchBox.contains(e.target)) suggestions.style.display="none";
});


/* ✅ HIGHLIGHT */
function applyHighlight(){
  document.querySelectorAll("pre code").forEach(b=>{
    hljs.highlightElement(b);
  });
}
document.addEventListener("keydown", function(e){

  
});
</script>

</body>
</html>
