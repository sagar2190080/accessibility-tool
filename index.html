<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Issue Tool</title>

<style>
body { font-family: Arial; margin:0; }

header {
  background:#1f3c88;
  color:white;
  padding:15px;
}

.wrapper { display:flex; height:90vh; }

.left {
  width:40%;
  background:#f5f5f5;
  padding:10px;
  overflow:auto;
}

.right {
  width:60%;
  padding:20px;
}

.card {
  padding:10px;
  border-bottom:1px solid #ccc;
  cursor:pointer;
}
.card:hover { background:#e6f0ff; }

input {
  width:100%;
  padding:8px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<h2>Accessibility Issue Tool</h2>
</header>

<div class="wrapper">

<div class="left">
<input id="searchBox" placeholder="Search...">
<div id="resultList"></div>
</div>

<div class="right" id="previewPanel">
<h3>Select an issue</h3>
</div>

</div>

<script>

let issues = [];
let filtered = [];

/* ✅ FIX: SAFE VALUE FUNCTION */
function safe(val){
  if(!val || val.trim()==="") return "-";
  return val;
}

/* ✅ FIX: HANDLE BAD SEVERITY DATA */
function fixSeverity(i){
  if(i["Severity"]) return i["Severity"];

  // fallback patterns in your JSON
  if(i["Issue"]==="High" || i["Issue"]==="Medium" || i["Issue"]==="Low")
    return i["Issue"];

  if(i["Suggestion"] && i["Suggestion"].includes("High"))
    return "High";

  return "-";
}

/* ✅ LOAD DATA */
window.onload = function(){

  fetch("./repository.json")
  .then(res => res.json())
  .then(data => {

    // ✅ remove garbage rows (very important for your file)
    issues = data.filter(x => x["Issue"] && x["Issue"].length > 5);

    filtered = issues;

    renderList();

    if(filtered.length){
      showDetails(filtered[0]);
    }
  });

};

/* ✅ SEARCH */
searchBox.addEventListener("input", function(){

  let q = this.value.toLowerCase();

  filtered = issues.filter(i =>
    (i["Issue"] + " " + i["Issue Description"] + " " + i["Suggestion"])
    .toLowerCase()
    .includes(q)
  );

  renderList();

});

/* ✅ LEFT SIDE LIST */
function renderList(){

  resultList.innerHTML = "";

  filtered.forEach(i => {

    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = "<b>" + i["Issue"] + "</b>";

    div.onclick = () => showDetails(i);

    resultList.appendChild(div);
  });

}

/* ✅ RIGHT SIDE DETAILS (FINAL FIX) */
function showDetails(i){

  let type = safe(i["Type of Issue"]);
  let severity = fixSeverity(i);

  let wcagLevel = safe(i["WCAG 2.0 Conformance Level"]);
  let wcagSC = safe(i["WCAG 2.0"]);

  let description = ((i["Issue Description"] || "") + " " +
                     (i["Rationale"] || "")).trim();

  let suggestion = safe(i["Suggestion"]);

  previewPanel.innerHTML = `
    <h2>${i["Issue"]}</h2>

    <p><b>Type:</b> ${type}</p>
    <p><b>Severity:</b> ${severity}</p>
    <p><b>WCAG:</b> ${wcagLevel} | ${wcagSC}</p>

    <hr>

    <h3>Description</h3>
    <p>${safe(description)}</p>

    <h3>Suggestion</h3>
    <p>${suggestion}</p>
  `;
}

</script>

</body>
</html>
