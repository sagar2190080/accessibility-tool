<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* MAIN */
.wrapper{
  display:flex;
  height:100vh;
}

/* LEFT LIST */
.left{
  width:30%;
  background:white;
  border-right:1px solid #ccc;
  overflow:auto;
}

.card{
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.card:hover{
  background:#f5f5f5;
}

/* RIGHT PANEL */
.right{
  width:70%;
  display:flex;
  flex-direction:column;
  background:white;
}

/* TITLE */
.title{
  font-size:20px;
  font-weight:bold;
  padding:15px;
}

/* ✅ TAB + SEVERITY ROW (IMPORTANT CHANGE) */
.tab-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ccc;
  background:#eee;
  padding-left:10px;
}

/* TABS */
.tabs{
  display:flex;
}

.tab{
  padding:10px 15px;
  border:1px solid #ccc;
  border-bottom:none;
  margin-right:5px;
  background:#e5e5e5;
  cursor:pointer;
}

.tab.active{
  background:white;
  border-top:3px solid #2f56d3;
  font-weight:bold;
}

/* ✅ INLINE SEVERITY (NEW POSITION) */
.severity-box{
  margin-right:15px;
  border:1px solid #ccc;
  text-align:center;
  min-width:120px;
}

.sev-header{
  background:#f2f2f2;
  font-size:12px;
  padding:5px;
}

.sev-value{
  padding:8px;
  font-size:16px;
}

/* COLORS */
.high{background:#ff6a00;color:white;}
.medium{background:#ffc107;}
.low{background:#4caf50;color:white;}

/* CONTENT */
.content{
  padding:15px;
  line-height:1.6;
  font-size:14px;
}

/* CODE */
pre{
  background:#fafafa;
  border:1px solid #ccc;
  padding:10px;
  margin-top:10px;
  overflow:auto;
}

</style>
</head>

<body>

<div class="wrapper">

<!-- LEFT -->
<div class="left" id="resultList"></div>

<!-- RIGHT -->
<div class="right" id="previewPanel">
  <h3 style="padding:20px">Select an issue</h3>
</div>

</div>

<script>

let issues=[];
let current={};

/* LOAD */
window.onload=function(){
  let data=localStorage.getItem("repoData");
  if(!data) return;

  issues=JSON.parse(data);
  renderList();
};

/* LIST */
function renderList(){

  resultList.innerHTML="";

  issues.forEach(i=>{

    let div=document.createElement("div");
    div.className="card";
    div.innerText=i.issue;

    div.onclick=()=>showDetails(i);

    resultList.appendChild(div);
  });
}

/* TAB SWITCH */
function switchTab(tab){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  let content="";

  if(tab==="t1") content=format(current.description);
  if(tab==="t2") content=format(current.suggestion);

  document.getElementById("contentArea").innerHTML=content;
}

/* SHOW DETAILS */
function showDetails(i){

  current=i;

  previewPanel.innerHTML=`

  <div class="title">${i.issue}</div>

  <!-- ✅ TAB + SEVERITY SAME ROW -->
  <div class="tab-row">

    <div class="tabs">
      <div class="tab active" id="t1" onclick="switchTab('t1')">Description</div>
      <div class="tab" id="t2" onclick="switchTab('t2')">Recommendations</div>
    </div>

    <!-- ✅ SEVERITY INSIDE TAB PANEL -->
    <div class="severity-box">
      <div class="sev-header">Severity</div>
      <div class="sev-value ${
        i.severity==="High"?"high":
        i.severity==="Medium"?"medium":"low"
      }">
        ${i.severity}
      </div>
    </div>

  </div>

  <!-- CONTENT -->
  <div class="content" id="contentArea">
    ${format(i.description)}
  </div>
  `;
}

/* FORMAT */
function format(text){

  if(!text) return "";

  let escaped=text.replace(/</g,"&lt;").replace(/>/g,"&gt;");
  let pos=escaped.search(/&lt;/);

  if(pos!=-1){
    let t=escaped.substring(0,pos);
    let c=escaped.substring(pos);

    return `<p>${t}</p><pre>${c}</pre>`;
  }

  return `<p>${escaped}</p>`;
}

</script>

</body>
</html>
