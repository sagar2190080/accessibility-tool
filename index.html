<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9;}

header {
  background:#1f3c88;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.dashboard {
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
}
.stat {
  flex:1;
  padding:10px;
  border-radius:6px;
  color:white;
  text-align:center;
}
.total { background:#007bff; }
.high { background:#dc3545; }
.medium { background:#ffc107; color:black; }
.low { background:#28a745; }

.wrapper { display:flex; height:85vh; }
.left { width:40%; background:white; padding:10px; overflow:auto; }
.right { width:60%; padding:20px; }

.search-container { position:relative; }

#suggestions {
  position:absolute;
  width:100%;
  background:white;
  border:1px solid #ccc;
  max-height:200px;
  overflow:auto;
  display:none;
}

.card {
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.card:hover { background:#eef2ff; }

.code-block {
  background:#f4f4f4;
  padding:10px;
  font-family:monospace;
}
</style>
</head>

<body>

<header>
  <div>Accessibility Tool 🚀</div>
  <button onclick="generateReport()">Export Excel</button>
</header>

<div class="dashboard">
  <div id="totalBox" class="stat total"></div>
  <div id="highBox" class="stat high"></div>
  <div id="mediumBox" class="stat medium"></div>
  <div id="lowBox" class="stat low"></div>
</div>

<div class="wrapper">

<div class="left">

<div class="search-container">
  <input id="searchBox" placeholder="Search..." style="width:100%;">
  <div id="suggestions"></div>
</div>

<div id="resultList"></div>

</div>

<div class="right" id="previewPanel">
<h3>Loading...</h3>
</div>

</div>

<script>

let issues=[], filtered=[];

/* ✅ UNIVERSAL MAPPING (FINAL FIX) */
function get(obj, keys){
  for(let k of keys){
    if(obj[k] !== undefined) return obj[k];
  }
  return "";
}

function mapData(obj){

  return {
    issue: get(obj, ["issue","Issue","Issue Name"]),
    type: get(obj, ["type","Type","Type Name"]),
    description: get(obj, ["description","Description"]),
    suggestion: get(obj, ["suggestion","Suggestion","Recommendation"]),
    severity: get(obj, ["severity","Severity"]),
    wcagLevel: get(obj, ["wcagLevel","WCAG Level","Level"]),
    wcagSC: get(obj, ["wcagSC","SC","Success Criteria"])
  };
}

function safe(v){ return (v||"").toString(); }

/* LOAD */
window.onload=function(){

  fetch("./repository.json")
  .then(r=>r.json())
  .then(data=>{

    issues = data.map(mapData); // ✅ CORE FIX
    filtered = issues;

    updateDashboard();
    render();

    if(filtered.length){
      showPreview(filtered[0]);
    }

  });
};

/* DASHBOARD */
function updateDashboard(){
  totalBox.innerText="Total: "+issues.length;
  highBox.innerText="High: "+issues.filter(i=>i.severity==="High").length;
  mediumBox.innerText="Medium: "+issues.filter(i=>i.severity==="Medium").length;
  lowBox.innerText="Low: "+issues.filter(i=>i.severity==="Low").length;
}

/* SEARCH */
searchBox.addEventListener("input",function(){

  let q=this.value.toLowerCase();

  filtered=issues.filter(i=>{
    let text = (
      safe(i.issue)+" "+
      safe(i.description)+" "+
      safe(i.suggestion)
    ).toLowerCase();

    return text.includes(q);
  });

  render();

  if(filtered.length){
    showPreview(filtered[0]);
  } else {
    previewPanel.innerHTML="<h3>No results</h3>";
  }
});

/* LIST */
function render(){

  resultList.innerHTML="";

  filtered.forEach(i=>{

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML="<b>"+safe(i.issue || "No Title")+"</b>";

    div.onclick=()=>showPreview(i);

    resultList.appendChild(div);
  });
}

/* PREVIEW */
function showPreview(i){

  if(!i.issue){
    previewPanel.innerHTML="<h3>No valid data mapping</h3>";
    return;
  }

  previewPanel.innerHTML=`
    <h3>${safe(i.issue)}</h3>

    <p><b>Type:</b> ${safe(i.type)}</p>
    <p><b>Severity:</b> ${safe(i.severity)}</p>
    <p><b>WCAG:</b> ${safe(i.wcagLevel)} | ${safe(i.wcagSC)}</p>

    <p><b>Description:</b></p>
    <p>${safe(i.description)}</p>

    <p><b>Suggestion:</b></p>
    <p>${safe(i.suggestion)}</p>
  `;
}

/* EXPORT */
function generateReport(){

  let rows=[["Issue","Severity"]];

  issues.forEach(i=>{
    rows.push([i.issue,i.severity]);
  });

  let ws=XLSX.utils.aoa_to_sheet(rows);
  let wb=XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb,ws,"Report");

  XLSX.writeFile(wb,"Accessibility_Report.xlsx");
}

</script>

</body>
</html>
