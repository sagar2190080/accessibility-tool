<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<!-- ✅ Highlight.js CSS -->
<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">

<style>
body { font-family: Arial; margin:0; }

header {
  background:#1f3c88;
  color:white;
  padding:15px;
}

.wrapper {
  display:flex;
  height:90vh;
}

.left {
  width:40%;
  background:#f5f5f5;
  padding:10px;
  overflow:auto;
  position:relative;
}

.right {
  width:60%;
  padding:20px;
  overflow:auto;
}

input {
  width:100%;
  padding:8px;
}

#suggestions {
  position:absolute;
  background:white;
  width:95%;
  border:1px solid #ccc;
  max-height:250px;
  overflow:auto;
  display:none;
}

.suggestion-item {
  padding:8px;
  cursor:pointer;
}
.suggestion-item:hover {
  background:#e6f0ff;
}

.card {
  padding:10px;
  border-bottom:1px solid #ccc;
  cursor:pointer;
}
.card:hover {
  background:#e6f0ff;
}

/* ✅ Code block styling */
pre {
  background:#f4f4f4;
  padding:10px;
  overflow:auto;
  white-space:pre-wrap;
  border-radius:6px;
}
</style>

</head>

<body>

<header>
<h2>Accessibility Tool</h2>
</header>

<div class="wrapper">

<div class="left">

<input id="searchBox" placeholder="Search...">
<div id="suggestions"></div>

<br>
<div id="resultList"></div>

</div>

<div class="right" id="previewPanel">
<h3>Select an issue</h3>
</div>

</div>

<!-- ✅ Highlight.js Script -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script>

let issues = [];
let filtered = [];

/* ✅ Escape HTML */
function escapeHTML(text){
  if(!text) return "";
  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* ✅ Split content + syntax highlight */
function formatContent(text){

  if(!text) return "";

  let parts = text.split("Code Snippet:");

  if(parts.length === 1){
    return "<p>" + escapeHTML(text) + "</p>";
  }

  let normalText = escapeHTML(parts[0]);
  let codeText = escapeHTML(parts[1]);

  return `
    <p>${normalText}</p>
    <b>Code Snippet:</b>
    <pre><code class="language-html">${codeText}</code></pre>
  `;
}

/* ✅ Load data */
window.onload = function(){

  let saved = localStorage.getItem("repoData");

  if(!saved){
    previewPanel.innerHTML = "<h3>Please import Excel first</h3>";
    return;
  }

  issues = JSON.parse(saved);
  filtered = issues;

  renderList();
  showDetails(filtered[0]);
};

/* ✅ Search */
searchBox.addEventListener("input", function(){

  let q = this.value.toLowerCase();

  filtered = issues.filter(i =>
    (i.issue + " " + i.description + " " + i.rationale + " " + i.suggestion)
    .toLowerCase()
    .includes(q)
  );

  renderList();
  showSuggestions();
});

/* ✅ Suggestions */
function showSuggestions(){

  if(!searchBox.value){
    suggestions.style.display="none";
    return;
  }

  suggestions.innerHTML="";

  filtered.forEach(i => {

    let div=document.createElement("div");
    div.className="suggestion-item";
    div.innerText = i.issue;

    div.onclick=()=>{
      searchBox.value=i.issue;
      suggestions.style.display="none";

      filtered=[i];
      renderList();
      showDetails(i);
    };

    suggestions.appendChild(div);
  });

  suggestions.style.display="block";
}

/* ✅ List */
function renderList(){

  resultList.innerHTML="";

  filtered.forEach(i => {

    let div=document.createElement("div");
    div.className="card";
    div.innerHTML="<b>"+i.issue+"</b>";

    div.onclick=()=>showDetails(i);

    resultList.appendChild(div);
  });
}

/* ✅ Details panel */
function showDetails(i){

  previewPanel.innerHTML=`
    <h2>${i.issue}</h2>

    <p><b>Type:</b> ${i.type}</p>
    <p><b>Severity:</b> ${i.severity}</p>
    <p><b>WCAG:</b> ${i.wcagLevel} | ${i.wcagSC}</p>

    <hr>

    <h3>Description</h3>
    ${formatContent(i.description)}

    <h3>Rationale</h3>
    <p>${escapeHTML(i.rationale)}</p>

    <h3>Suggestion</h3>
    ${formatContent(i.suggestion)}
  `;

  /* ✅ APPLY SYNTAX HIGHLIGHT */
  document.querySelectorAll('pre code').forEach((block) => {
    hljs.highlightElement(block);
  });
}

</script>

</body>
</html>
