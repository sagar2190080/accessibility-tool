<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Issue Tool</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }

header {
  background:#1f3c88;
  color:white;
  padding:15px;
}

.wrapper {
  display:flex;
  height:90vh;
}

.left {
  width:40%;
  background:white;
  padding:10px;
  overflow:auto;
}

.right {
  width:60%;
  padding:20px;
}

.card {
  padding:10px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
}
.card:hover { background:#eef; }

input {
  width:100%;
  padding:8px;
  margin-bottom:10px;
}
</style>

</head>

<body>

<header>
  <h2>Accessibility Issue Tool</h2>
</header>

<div class="wrapper">

<div class="left">

<input id="searchBox" placeholder="Search issues...">

<div id="resultList"></div>

</div>

<div class="right" id="previewPanel">
<h3>Select an issue</h3>
</div>

</div>

<script>

let issues = [];
let filtered = [];

/* ✅ LOAD DATA (NO MAPPING NEEDED) */
window.onload = function(){

  fetch("./repository.json")
  .then(r=>r.json())
  .then(data=>{

    issues = data.filter(i => i["Issue"]); // ✅ ignore empty rows
    filtered = issues;

    render();

    if(filtered.length){
      showPreview(filtered[0]);
    }
  });
};

/* ✅ SEARCH */
searchBox.addEventListener("input", function(){

  let q = this.value.toLowerCase();

  filtered = issues.filter(i => 
    (i["Issue"] + " " + i["Issue Description"] + " " + i["Suggestion"])
    .toLowerCase()
    .includes(q)
  );

  render();

});

/* ✅ LIST RENDER */
function render(){

  resultList.innerHTML = "";

  filtered.forEach(i => {

    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = "<b>" + i["Issue"] + "</b>";

    div.onclick = () => showPreview(i);

    resultList.appendChild(div);

  });

}

/* ✅ PREVIEW PANEL */
function showPreview(i){

  previewPanel.innerHTML = `
    <h2>${i["Issue"]}</h2>

    <p><b>Type:</b> ${i["Type of Issue"] || "-"}</p>

    <p><b>Severity:</b> ${i["Severity"] || "-"}</p>

    <p><b>WCAG:</b> ${i["WCAG 2.0 Conformance Level"] || "-"} 
       | ${i["WCAG 2.0"] || "-"}</p>

    <hr>

    <h3>Description</h3>
    <p>${(i["Issue Description"] || "") + " " + (i["Rationale"] || "")}</p>

    <h3>Suggestion</h3>
    <p>${i["Suggestion"] || "-"}</p>
  `;
}

</script>

</body>
</html>
