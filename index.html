<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
}

/* BLUE HEADER */
.detail-header {
  background:#2f56d3;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

/* MAIN LAYOUT */
.wrapper {
  display:flex;
  height:95vh;
}

.left {
  width:30%;
  background:white;
  border-right:1px solid #ccc;
  overflow:auto;
}

.right {
  width:70%;
  background:white;
}

/* ISSUE LIST */
.card {
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.card:hover {
  background:#f0f4ff;
}

/* TITLE */
.issue-title {
  font-size:20px;
  font-weight:bold;
  padding:15px;
}

/* TABS */
.tabs {
  display:flex;
  border-bottom:1px solid #ccc;
}

.tab {
  padding:10px 15px;
  border-right:1px solid #ddd;
  cursor:pointer;
  background:#eee;
  font-size:14px;
}

.tab.active {
  background:white;
  border-bottom:3px solid #2f56d3;
  font-weight:bold;
}

/* BODY */
.detail-body {
  display:flex;
}

/* CONTENT */
.content {
  width:75%;
  padding:15px;
  line-height:1.6;
}

/* SIDEBAR */
.sidebar {
  width:25%;
  border-left:1px solid #ddd;
  padding:10px;
}

/* SCORE BOX */
.score-box {
  border:1px solid #ccc;
  margin-bottom:10px;
  text-align:center;
}

.score-box h4 {
  margin:0;
  padding:6px;
  background:#f2f2f2;
}

.score-big {
  font-size:36px;
  padding:20px;
}

.sev-high {background:#ff6b2d; color:white;}
.sev-medium {background:#ffc107;}
.sev-low {background:#4caf50; color:white;}

.score-small {
  font-size:26px;
  padding:15px;
}

/* CODE */
pre {
  background:#fafafa;
  border:1px solid #ccc;
  padding:10px;
  overflow:auto;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="wrapper">

<!-- LEFT PANEL -->
<div class="left" id="resultList"></div>

<!-- RIGHT PANEL -->
<div class="right" id="previewPanel">
  <h3 style="padding:15px;">Select an issue</h3>
</div>

</div>

<script>

let issues = [];
let current = {};

/* LOAD */
window.onload = function(){

  let data = localStorage.getItem("repoData");
  if(!data) return;

  issues = JSON.parse(data);
  renderList();
};

/* LIST */
function renderList(){

  resultList.innerHTML="";

  issues.forEach(i=>{

    let div=document.createElement("div");
    div.className="card";
    div.innerText=i.issue;

    div.onclick=()=>showDetails(i);

    resultList.appendChild(div);
  });
}

/* TAB SWITCH */
function switchTab(type){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  document.getElementById(type).classList.add("active");

  let content = "";

  if(type==="descriptionTab") content = formatContent(current.description);
  if(type==="examplesTab") content = "<p>No examples available</p>";
  if(type==="recommendationsTab") content = formatContent(current.suggestion);
  if(type==="modulesTab") content = "<p>-</p>";
  if(type==="standardsTab") content = "<p>-</p>";
  if(type==="testsTab") content = "<p>-</p>";

  document.getElementById("contentArea").innerHTML = content;
}

/* SHOW DETAILS */
function showDetails(i){

  current = i;

  previewPanel.innerHTML=`

  <!-- HEADER -->
  <div class="detail-header">
    <div>View Best Practice</div>
    <div style="cursor:pointer" onclick="previewPanel.innerHTML=''">✖</div>
  </div>

  <!-- TITLE -->
  <div class="issue-title">${i.issue}</div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" id="descriptionTab" onclick="switchTab('descriptionTab')">Description</div>
    <div class="tab" id="examplesTab" onclick="switchTab('examplesTab')">Examples</div>
    <div class="tab" id="recommendationsTab" onclick="switchTab('recommendationsTab')">Recommendations</div>
    <div class="tab" id="modulesTab" onclick="switchTab('modulesTab')">Modules</div>
    <div class="tab" id="standardsTab" onclick="switchTab('standardsTab')">Standards</div>
    <div class="tab" id="testsTab" onclick="switchTab('testsTab')">Tests</div>
  </div>

  <!-- BODY -->
  <div class="detail-body">

    <!-- LEFT CONTENT -->
    <div class="content" id="contentArea">
      ${formatContent(i.description)}
    </div>

    <!-- RIGHT SIDEBAR -->
    <div class="sidebar">

      <div class="score-box">
        <h4>Severity</h4>
        <div class="score-big ${
          i.severity==="High"?"sev-high":
          i.severity==="Medium"?"sev-medium":"sev-low"
        }">
          ${i.severity}
        </div>
      </div>

      <div class="score-box">
        <h4>Noticeability</h4>
        <div class="score-small">7</div>
      </div>

      <div class="score-box">
        <h4>Tractability</h4>
        <div class="score-small">4</div>
      </div>

    </div>

  </div>
  `;
}

/* FORMAT */
function formatContent(text){

  if(!text) return "";

  let escaped = text
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");

  let pos = escaped.search(/&lt;/);

  if(pos!==-1){

    let t = escaped.substring(0,pos);
    let c = escaped.substring(pos);

    return `<p>${t}</p><pre>${c}</pre>`;
  }

  return `<p>${escaped}</p>`;
}

</script>

</body>
</html>
