<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Issue Tool</title>

<style>
body { font-family: Arial; margin:0; }

header {
  background:#1f3c88;
  color:white;
  padding:15px;
}

.wrapper { display:flex; height:90vh; }

.left {
  width:40%;
  background:#f5f5f5;
  padding:10px;
  overflow:auto;
}

.right {
  width:60%;
  padding:20px;
}

.card {
  padding:10px;
  border-bottom:1px solid #ccc;
  cursor:pointer;
}
.card:hover { background:#e6f0ff; }

input {
  width:100%;
  padding:8px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<h2>Accessibility Issue Tool</h2>
</header>

<div class="wrapper">

<div class="left">
<input id="searchBox" placeholder="Search...">
<div id="resultList"></div>
</div>

<div class="right" id="previewPanel">
<h3>Select an issue</h3>
</div>

</div>

<script>

let issues = [];
let filtered = [];

/* ✅ CRITICAL FIX: Smart key resolver */
function get(obj, keyword){
  let key = Object.keys(obj).find(k => 
    k.trim().toLowerCase().includes(keyword.toLowerCase())
  );
  return key ? obj[key] : "";
}

/* ✅ LOAD */
window.onload = function(){

  fetch("./repository.json")
  .then(res => res.json())
  .then(data => {

    issues = data.map(row => ({
      issue: get(row,"issue"),
      type: get(row,"type"),
      description: get(row,"description"),
      rationale: get(row,"rationale"),
      suggestion: get(row,"suggestion"),
      severity: get(row,"severity"),
      wcagLevel: get(row,"level"),
      wcagSC: get(row,"wcag")
    }))
    .filter(x => x.issue && x.issue.length > 5);

    filtered = issues;

    render();

    if(filtered.length){
      show(filtered[0]);
    }

  });

};

/* ✅ SEARCH */
searchBox.addEventListener("input", function(){

  let q = this.value.toLowerCase();

  filtered = issues.filter(i =>
    (i.issue + " " + i.description + " " + i.suggestion)
    .toLowerCase()
    .includes(q)
  );

  render();

});

/* ✅ LIST */
function render(){

  resultList.innerHTML="";

  filtered.forEach(i=>{

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML = "<b>"+i.issue+"</b>";

    div.onclick = ()=> show(i);

    resultList.appendChild(div);
  });
}

/* ✅ DETAIL PANEL */
function show(i){

  let desc = (i.description + " " + i.rationale).trim();

  previewPanel.innerHTML = `
    <h2>${i.issue}</h2>

    <p><b>Type:</b> ${i.type || "-"}</p>
    <p><b>Severity:</b> ${i.severity || "-"}</p>
    <p><b>WCAG:</b> ${i.wcagLevel || "-"} | ${i.wcagSC || "-"}</p>

    <hr>

    <h3>Description</h3>
    <p>${desc || "-"}</p>

    <h3>Suggestion</h3>
    <p>${i.suggestion || "-"}</p>
  `;
}

</script>

</body>
</html>
