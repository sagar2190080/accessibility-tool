<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9;}

header {
  background:#1f3c88;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* Dashboard */
.dashboard {
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
}
.stat {
  flex:1;
  padding:10px;
  border-radius:6px;
  text-align:center;
  color:white;
}
.total { background:#007bff; }
.high { background:#dc3545; }
.medium { background:#ffc107; color:black; }
.low { background:#28a745; }

/* Layout */
.wrapper { display:flex; height:85vh; }
.left { width:40%; background:white; padding:10px; overflow:auto; }
.right { width:60%; padding:20px; }

/* Search */
.search-container { position:relative; }

#suggestions {
  position:absolute;
  width:100%;
  background:white;
  border:1px solid #ccc;
  display:none;
  max-height:200px;
  overflow:auto;
}

.suggestion-item {
  padding:8px;
  cursor:pointer;
}
.suggestion-item:hover { background:#eef2ff; }

/* List */
.card {
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.card:hover { background:#eef2ff; }

/* Code */
.code-block {
  background:#f4f4f4;
  padding:10px;
  font-family:monospace;
}

</style>
</head>

<body>

<header>
  <div>Accessibility Tool 🚀</div>
  <button onclick="generateReport()">Export Excel</button>
</header>

<div class="dashboard">
  <div id="totalBox" class="stat total">Total: 0</div>
  <div id="highBox" class="stat high">High: 0</div>
  <div id="mediumBox" class="stat medium">Medium: 0</div>
  <div id="lowBox" class="stat low">Low: 0</div>
</div>

<div class="wrapper">

<div class="left">

<div class="search-container">
  <input id="searchBox" placeholder="Search..." style="width:100%;">
  <div id="suggestions"></div>
</div>

<div id="resultList"></div>

</div>

<div class="right" id="previewPanel">
<h3>Loading...</h3>
</div>

</div>

<script>

let issues = [];
let filtered = [];

/* SAFE */
function safe(v){
  return (v || "").toString();
}

/* LOAD DATA */
window.onload = function(){
  fetch("./repository.json")
  .then(res=>{
    if(!res.ok) throw new Error("File not found");
    return res.json();
  })
  .then(data=>{
    issues = Array.isArray(data) ? data : [];
    filtered = issues;

    updateDashboard();
    render();

    if(filtered.length){
      showPreview(filtered[0]);
    }
  })
  .catch(()=>{
    previewPanel.innerHTML="<h3 style='color:red;'>Error loading data</h3>";
  });
};

/* DASHBOARD */
function updateDashboard(){
  totalBox.innerText = "Total: " + issues.length;
  highBox.innerText = "High: " + issues.filter(i=>i.severity==="High").length;
  mediumBox.innerText = "Medium: " + issues.filter(i=>i.severity==="Medium").length;
  lowBox.innerText = "Low: " + issues.filter(i=>i.severity==="Low").length;
}

/* ✅ SMART SEARCH (MAIN FIX) */
document.getElementById("searchBox").addEventListener("input", function(){

  let q = this.value.toLowerCase().trim();

  if(!q){
    filtered = issues;
  } else {

    filtered = issues.filter(i => {
      let text = (
        safe(i.issue) + " " +
        safe(i.description) + " " +
        safe(i.suggestion)
      ).toLowerCase();

      return text.includes(q);
    });

    /* ✅ fallback (never empty UI) */
    if(filtered.length === 0){
      filtered = issues;
    }
  }

  render();
  showSuggestions(q);

  if(filtered.length){
    showPreview(filtered[0]);
  }
});

/* ✅ SUGGESTIONS BACK */
function showSuggestions(q){

  let box = document.getElementById("suggestions");

  if(!q){
    box.style.display="none";
    return;
  }

  let matches = issues.filter(i =>
    safe(i.issue).toLowerCase().includes(q)
  );

  box.innerHTML="";

  matches.forEach(i=>{
    let div=document.createElement("div");
    div.className="suggestion-item";
    div.innerText=i.issue;

    div.onclick=function(){
      searchBox.value=i.issue;
      box.style.display="none";

      filtered=[i];
      render();
      showPreview(i);
    };

    box.appendChild(div);
  });

  box.style.display = matches.length ? "block" : "none";
}

/* LIST */
function render(){

  let list=document.getElementById("resultList");
  list.innerHTML="";

  filtered.forEach(i=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML="<b>"+safe(i.issue)+"</b>";

    div.onclick=()=>showPreview(i);
    list.appendChild(div);
  });
}

/* PREVIEW */
function showPreview(i){

  let parts = safe(i.description).split("Code Snippet:");

  previewPanel.innerHTML=`
    <h3>${i.issue}</h3>

    <p><b>Type:</b> ${i.type}</p>
    <p><b>Severity:</b> ${i.severity}</p>
    <p><b>WCAG:</b> ${i.wcagLevel} | ${i.wcagSC}</p>

    <p><b>Description:</b></p>
    <p>${parts[0]}</p>

    <p><b>Code Snippet:</b></p>
    <div class="code-block">${escapeHTML(parts[1] || "")}</div>

    <p><b>Suggestion:</b></p>
    <p>${safe(i.suggestion)}</p>
  `;
}

/* SAFE HTML */
function escapeHTML(t){
  return safe(t)
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* EXPORT */
function generateReport(){

  let rows=[["Issue","Severity"]];

  issues.forEach(i=>{
    rows.push([i.issue,i.severity]);
  });

  let ws=XLSX.utils.aoa_to_sheet(rows);
  let wb=XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb,ws,"Report");

  XLSX.writeFile(wb,"Accessibility_Report.xlsx");
}

</script>

</body>
</html>
