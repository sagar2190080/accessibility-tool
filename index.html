<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<!-- ✅ Highlight.js -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial;
  background:#eef1f5;
}

/* LAYOUT */
.wrapper{
  display:flex;
  height:100vh;
}

/* ✅ LEFT PANEL */
.left{
  width:28%;
  background:white;
  border-right:1px solid #ddd;
  overflow:auto;
}

/* LIST ITEM */
.card{
  padding:12px 14px;
  border-bottom:1px solid #f0f0f0;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  background:#f6f8ff;
}

.card.active{
  background:#e9efff;
  border-left:4px solid #2f56d3;
  padding-left:10px;
}

/* ✅ RIGHT PANEL */
.right{
  width:72%;
  background:white;
  display:flex;
  flex-direction:column;
}

/* TITLE */
.title{
  font-size:20px;
  font-weight:600;
  padding:15px;
}

/* TABS */
.tab-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
}

.tabs{
  display:flex;
}

.tab{
  padding:10px 14px;
  cursor:pointer;
  border-bottom:3px solid transparent;
}

.tab.active{
  border-bottom:3px solid #2f56d3;
  font-weight:600;
}

/* SEVERITY */
.severity{
  margin-right:10px;
  padding:6px 12px;
  border-radius:4px;
  font-weight:600;
}

.high{background:#ff6a00;color:white;}
.medium{background:#ffc107;}
.low{background:#4caf50;color:white;}

/* CONTENT */
.content{
  padding:18px;
  overflow:auto;
  line-height:1.6;
}

/* CODE */
pre{
  background:#f8f9fa;
  border:1px solid #ddd;
  border-radius:6px;
  padding:12px;
  overflow:auto;
  font-size:13px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="left" id="resultList"></div>

<div class="right" id="previewPanel">
  <h3 style="padding:20px">Select an issue</h3>
</div>

</div>

<script>

let issues=[];
let current={};
let currentIndex=0;

/* LOAD */
window.onload=function(){
  let data=localStorage.getItem("repoData");
  if(!data) return;

  issues=JSON.parse(data);
  renderList();

  if(issues.length){
    showDetails(issues[0]);
  }
};

/* ✅ LEFT PANEL LIST */
function renderList(){

  resultList.innerHTML="";

  issues.forEach((i,index)=>{

    let d=document.createElement("div");
    d.className="card";
    d.innerText=i.issue;

    if(index===currentIndex){
      d.classList.add("active");
    }

    d.onclick=()=>{
      currentIndex=index;
      renderList();
      showDetails(i);
    };

    resultList.appendChild(d);
  });
}

/* ✅ SHOW DETAILS */
function showDetails(i){

  current=i;

  previewPanel.innerHTML=`
    <div class="title">${i.issue}</div>

    <div class="tab-row">
      <div class="tabs">
        <div class="tab active" id="t1" onclick="switchTab('t1')">Description</div>
        <div class="tab" id="t2" onclick="switchTab('t2')">User Impact</div>
        <div class="tab" id="t3" onclick="switchTab('t3')">Recommendations</div>
      </div>

      <div class="severity ${
        i.severity==="High"?"high":
        i.severity==="Medium"?"medium":"low"
      }">${i.severity}</div>
    </div>

    <div class="content" id="contentArea">
      ${format(i.description)}
    </div>
  `;

  applyHighlight();
}

/* ✅ SWITCH TABS */
function switchTab(tab){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  let content="";

  if(tab==="t1") content=format(current.description);
  if(tab==="t2") content=format(current.rationale);
  if(tab==="t3") content=format(current.suggestion);

  contentArea.innerHTML=content;
  applyHighlight();
}

/* ✅ FINAL FORMATTER (FULL FIXED) */
function format(text){

  if(!text) return "<p>-</p>";

  let input=String(text);

  let normalText="";
  let codeText="";

  /* detect code */
  if(/Code Snippet:/i.test(input)){
    let parts=input.split(/Code Snippet:/i);
    normalText=parts[0].trim();
    codeText=parts[1].trim();
  }
  else if(/<[^>]+>/.test(input)){
    let pos=input.search(/<[^>]+>/);
    normalText=input.substring(0,pos).trim();
    codeText=input.substring(pos).trim();
  }
  else{
    return `<p>${input}</p>`;
  }

  /* ✅ FIXED TAG SPLIT */
  codeText = codeText
    .replace(/>\s*</g, ">\n<")
    .replace(/</g,"\n<")
    .replace(/>/g,">\n")
    .replace(/\n{2,}/g,"\n");

  let lines = codeText.split("\n")
    .map(l=>l.trim())
    .filter(l=>l);

  let formatted=[];
  let indent=0;

  lines.forEach(line=>{

    let isClosing=/^<\/.+>/.test(line);
    let isOpening=/^<[^\/!][^>]*>$/.test(line);
    let isSelfClosing=/\/>$/.test(line);

    if(isClosing) indent--;

    formatted.push("  ".repeat(Math.max(0,indent)) + line);

    if(isOpening && !isSelfClosing){
      indent++;
    }
  });

  let finalCode=formatted.join("\n")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");

  return `
    ${normalText ? `<p>${normalText}</p>` : ""}
    <pre><code class="language-html">${finalCode}</code></pre>
  `;
}

/* ✅ HIGHLIGHT */
function applyHighlight(){
  document.querySelectorAll("pre code").forEach(block=>{
    hljs.highlightElement(block);
  });
}

</script>

</body>
</html>
