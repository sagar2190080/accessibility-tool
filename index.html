<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9;}
header { background:#1f3c88; color:white; padding:15px; display:flex; justify-content:space-between; }

.dashboard { display:flex; gap:10px; padding:10px; background:white; }
.stat { flex:1; padding:10px; border-radius:6px; color:white; text-align:center; }
.total { background:#007bff; }
.high { background:#dc3545; }
.medium { background:#ffc107; color:black; }
.low { background:#28a745; }

.wrapper { display:flex; height:85vh; }
.left { width:40%; background:white; padding:10px; overflow:auto; }
.right { width:60%; padding:20px; }

.search-container { position:relative; }
#suggestions {
  position:absolute;
  width:100%;
  background:white;
  border:1px solid #ccc;
  max-height:200px;
  overflow:auto;
  display:none;
}

.card { padding:10px; border-bottom:1px solid #eee; cursor:pointer; }
.card:hover { background:#eef2ff; }

.code-block { background:#f4f4f4; padding:10px; font-family:monospace; }

</style>
</head>

<body>

<header>
  <div>Accessibility Tool 🚀</div>
  <button onclick="generateReport()">Export Excel</button>
</header>

<div class="dashboard">
  <div class="stat total" id="totalBox">Total: 0</div>
  <div class="stat high" id="highBox">High: 0</div>
  <div class="stat medium" id="mediumBox">Medium: 0</div>
  <div class="stat low" id="lowBox">Low: 0</div>
</div>

<div class="wrapper">

<div class="left">

<div class="search-container">
  <input id="searchBox" placeholder="Search..." style="width:100%;">
  <div id="suggestions"></div>
</div>

<div id="resultList"></div>

</div>

<div class="right" id="previewPanel">
<h3>Loading...</h3>
</div>

</div>

<script>

let issues=[];
let filtered=[];

/* ✅ SAFE TEXT */
function safe(v){
  return (v || "").toString();
}

/* ✅ SAFE LOAD */
window.onload=function(){

  loadData();
};

function loadData(){

  fetch("./repository.json")
  .then(res=>{
    if(!res.ok){
      throw new Error("File not found");
    }
    return res.json();
  })
  .then(data=>{

    issues = Array.isArray(data) ? data : [];
    filtered = issues;

    updateDashboard();
    render();

    if(filtered.length>0){
      showPreview(filtered[0]);
    } else {
      previewPanel.innerHTML="<h3>No data available</h3>";
    }

  })
  .catch(err=>{

    console.error("ERROR:", err);

    previewPanel.innerHTML = `
      <h3 style="color:red;">Error loading data</h3>
      <p>Check repository.json</p>
    `;
  });
}

/* ✅ DASHBOARD */
function updateDashboard(){

  totalBox.innerText="Total: "+issues.length;
  highBox.innerText="High: "+issues.filter(i=>i.severity==="High").length;
  mediumBox.innerText="Medium: "+issues.filter(i=>i.severity==="Medium").length;
  lowBox.innerText="Low: "+issues.filter(i=>i.severity==="Low").length;
}

/* ✅ SEARCH */
document.getElementById("searchBox").addEventListener("input",function(){

  let q=this.value.toLowerCase();

  filtered = issues.filter(i =>
    safe(i.issue).toLowerCase().includes(q) ||
    safe(i.description).toLowerCase().includes(q) ||
    safe(i.suggestion).toLowerCase().includes(q)
  );

  render();

  if(filtered.length>0){
    showPreview(filtered[0]);
  } else {
    previewPanel.innerHTML="<h3>No results</h3>";
  }
});

/* ✅ LIST */
function render(){

  let list=document.getElementById("resultList");
  list.innerHTML="";

  filtered.forEach(i=>{

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML="<b>"+safe(i.issue)+"</b>";

    div.onclick=()=>showPreview(i);

    list.appendChild(div);
  });
}

/* ✅ PREVIEW */
function showPreview(i){

  let parts = safe(i.description).split("Code Snippet:");

  previewPanel.innerHTML=`
    <h3>${safe(i.issue)}</h3>

    <p><b>Type:</b> ${safe(i.type)}</p>
    <p><b>Severity:</b> ${safe(i.severity)}</p>
    <p><b>WCAG:</b> ${safe(i.wcagLevel)} | ${safe(i.wcagSC)}</p>

    <p><b>Description:</b></p>
    <p>${parts[0]}</p>

    <p><b>Code Snippet:</b></p>
    <div class="code-block">${escapeHTML(parts[1]||"")}</div>

    <p><b>Suggestion:</b></p>
    <p>${safe(i.suggestion)}</p>
  `;
}

/* ✅ SAFE HTML */
function escapeHTML(t){
  return safe(t)
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* ✅ EXPORT */
function generateReport(){

  let rows=[["Issue","Severity"]];

  issues.forEach(i=>{
    rows.push([i.issue,i.severity]);
  });

  let ws=XLSX.utils.aoa_to_sheet(rows);
  let wb=XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb,ws,"Report");
  XLSX.writeFile(wb,"Report.xlsx");
}

</script>

</body>
</html>
