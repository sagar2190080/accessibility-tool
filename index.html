<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Issue Tool</title>

<style>
body { font-family: Arial; margin:0; }

header {
  background:#1f3c88;
  color:white;
  padding:15px;
}

.wrapper { display:flex; height:90vh; }

.left {
  width:40%;
  background:#f5f5f5;
  padding:10px;
  overflow:auto;
}

.right {
  width:60%;
  padding:20px;
}

.card {
  padding:10px;
  border-bottom:1px solid #ccc;
  cursor:pointer;
}
.card:hover { background:#e6f0ff; }

input {
  width:100%;
  padding:8px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<h2>Accessibility Issue Tool</h2>
</header>

<div class="wrapper">

<div class="left">

<input id="searchBox" placeholder="Search...">
<div id="resultList"></div>

</div>

<div class="right" id="previewPanel">
<h3>Select an issue</h3>
</div>

</div>

<script>

let issues = [];
let filtered = [];

window.onload = function(){

  fetch("./repository.json")
  .then(res => res.json())
  .then(data => {

    // ✅ Remove empty / junk rows
    issues = data.filter(item => item["Issue"] && item["Issue"].trim() !== "");

    filtered = issues;

    renderList();

    if(filtered.length){
      showDetails(filtered[0]);
    }

  });

};

/* ✅ SEARCH */
searchBox.addEventListener("input", function(){

  let q = this.value.toLowerCase();

  filtered = issues.filter(i =>
    (i["Issue"] + " " + i["Issue Description"] + " " + i["Suggestion"])
    .toLowerCase()
    .includes(q)
  );

  renderList();

});

/* ✅ LEFT LIST */
function renderList(){

  resultList.innerHTML = "";

  filtered.forEach(i => {

    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = "<b>" + i["Issue"] + "</b>";

    div.onclick = () => showDetails(i);

    resultList.appendChild(div);

  });

}

/* ✅ RIGHT PANEL (FULL FIX HERE) */
function showDetails(i){

  previewPanel.innerHTML = `
    <h2>${i["Issue"]}</h2>

    <p><b>Type:</b> ${i["Type of Issue"] || "-"}</p>
    <p><b>Severity:</b> ${i["Severity"] || "-"}</p>

    <p><b>WCAG:</b> 
      ${i["WCAG 2.0 Conformance Level"] || "-"} 
      | 
      ${i["WCAG 2.0"] || "-"}
    </p>

    <hr>

    <h3>Description</h3>
    <p>${(i["Issue Description"] || "") + " " + (i["Rationale"] || "")}</p>

    <h3>Suggestion</h3>
    <p>${i["Suggestion"] || "-"}</p>
  `;
}

</script>

</body>
</html>
