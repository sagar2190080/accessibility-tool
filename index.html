<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>

body {
  font-family: "Segoe UI", Arial;
  margin:0;
  background:#f0f2f5;
}

/* ✅ HEADER */
header {
  background:#1f3c88;
  color:white;
  padding:15px 20px;
  font-size:20px;
  font-weight:bold;
}

/* ✅ MAIN LAYOUT */
.wrapper {
  display:flex;
  height:calc(100vh - 60px);
}

/* ✅ LEFT PANEL */
.left {
  width:35%;
  background:white;
  border-right:1px solid #ddd;
  display:flex;
  flex-direction:column;
}

/* ✅ FILTER BAR */
.filters {
  padding:10px;
  border-bottom:1px solid #eee;
  background:#fafafa;
}

input, select {
  width:100%;
  padding:8px;
  margin-bottom:6px;
  border:1px solid #ccc;
  border-radius:6px;
}

/* ✅ ISSUE LIST */
.list {
  overflow:auto;
  flex:1;
}

.card {
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  background:#f5f8ff;
}

.card.active {
  background:#e6edff;
  border-left:4px solid #1f3c88;
}

/* ✅ RIGHT PANEL */
.right {
  width:65%;
  padding:20px;
  overflow:auto;
}

/* ✅ ISSUE TITLE */
.issue-title {
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}

/* ✅ META BADGES */
.meta-row {
  display:flex;
  gap:10px;
  margin-bottom:15px;
  flex-wrap:wrap;
}

.meta-item {
  padding:6px 12px;
  border-radius:20px;
  font-size:13px;
  color:white;
  font-weight:bold;
}

/* COLORS */
.type { background:#007bff; }
.sev-high { background:#dc3545; }
.sev-medium { background:#ffc107; color:black; }
.sev-low { background:#28a745; }
.wcag { background:#6f42c1; }

/* ✅ SECTIONS */
.section {
  margin-top:20px;
}

.section h3 {
  margin-bottom:8px;
}

/* ✅ CODE BLOCK */
pre {
  background:#f6f8fa;
  padding:12px;
  border-radius:8px;
  overflow:auto;
}

</style>

</head>

<body>

<header>Accessibility Tool</header>

<div class="wrapper">

<!-- LEFT PANEL -->
<div class="left">

<div class="filters">
<input id="searchBox" placeholder="Search...">

<select id="typeFilter"><option value="">All Types</option></select>
<select id="severityFilter"><option value="">All Severity</option></select>
<select id="wcagFilter"><option value="">All WCAG</option></select>
</div>

<div class="list" id="resultList"></div>

</div>

<!-- RIGHT PANEL -->
<div class="right" id="previewPanel">
<h3>Select an issue</h3>
</div>

</div>

<script>

let issues = [];
let filtered = [];
let activeIndex = 0;

/* ESCAPE */
function escapeHTML(text){
  if(!text) return "";
  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* FORMAT CONTENT */
function formatContent(text){

  if(!text) return "<p>-</p>";

  text = escapeHTML(text);

  if(text.includes("Code Snippet:")){
    let parts = text.split("Code Snippet:");
    return `
      <p>${parts[0]}</p>
      <pre><code class="language-html">${parts[1]}</code></pre>
    `;
  }

  let htmlMatch = text.match(/(&lt;.*&gt;)/);

  if(htmlMatch){
    let before = text.substring(0, htmlMatch.index);
    let code = text.substring(htmlMatch.index);

    return `
      <p>${before}</p>
      <pre><code class="language-html">${code}</code></pre>
    `;
  }

  return `<p>${text}</p>`;
}

/* LOAD */
window.onload = function(){

  let saved = localStorage.getItem("repoData");

  if(!saved){
    previewPanel.innerHTML = "<h3>Please import Excel first</h3>";
    return;
  }

  issues = JSON.parse(saved);

  populateFilters();
  applyFilters();
};

/* FILTERS */
function populateFilters(){

  let types = [...new Set(issues.map(i=>i.type).filter(Boolean))];
  let severity = [...new Set(issues.map(i=>i.severity).filter(Boolean))];
  let wcag = [...new Set(issues.map(i=>i.wcagLevel).filter(Boolean))];

  types.forEach(v=>typeFilter.innerHTML += `<option>${v}</option>`);
  severity.forEach(v=>severityFilter.innerHTML += `<option>${v}</option>`);
  wcag.forEach(v=>wcagFilter.innerHTML += `<option>${v}</option>`);
}

function applyFilters(){

  let q = searchBox.value.toLowerCase();
  let t = typeFilter.value;
  let s = severityFilter.value;
  let w = wcagFilter.value;

  filtered = issues.filter(i => {

    let text = (i.issue + i.description + i.rationale + i.suggestion).toLowerCase();

    return text.includes(q) &&
      (!t || i.type === t) &&
      (!s || i.severity === s) &&
      (!w || i.wcagLevel === w);
  });

  renderList();
  if(filtered.length) showDetails(0);
}

/* EVENTS */
searchBox.addEventListener("input", applyFilters);
typeFilter.addEventListener("change", applyFilters);
severityFilter.addEventListener("change", applyFilters);
wcagFilter.addEventListener("change", applyFilters);

/* LIST */
function renderList(){

  resultList.innerHTML="";

  filtered.forEach((i,index)=>{

    let div=document.createElement("div");
    div.className="card " + (index===activeIndex ? "active" : "");
    div.innerHTML="<b>"+i.issue+"</b>";

    div.onclick=()=>{
      activeIndex=index;
      renderList();
      showDetails(index);
    };

    resultList.appendChild(div);
  });
}

/* DETAILS */
function showDetails(index){

  let i = filtered[index];

  previewPanel.innerHTML=`
    <div class="issue-title">${i.issue}</div>

    <div class="meta-row">
      <div class="meta-item type">Type: ${i.type}</div>
      <div class="meta-item ${
        i.severity==="High"?"sev-high":
        i.severity==="Medium"?"sev-medium":"sev-low"
      }">
        Severity: ${i.severity}
      </div>
      <div class="meta-item wcag">
        WCAG: ${i.wcagLevel} | ${i.wcagSC}
      </div>
    </div>

    <div class="section">
      <h3>Description</h3>
      ${formatContent(i.description)}
    </div>

    <div class="section">
      <h3>Rationale</h3>
      ${formatContent(i.rationale)}
    </div>

    <div class="section">
      <h3>Suggestion</h3>
      ${formatContent(i.suggestion)}
    </div>
  `;

  document.querySelectorAll("pre code").forEach(block=>{
    hljs.highlightElement(block);
  });
}

</script>

</body>
</html>
