<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<style>
body { font-family: Arial; margin:0; }

header {
  background:#1f3c88;
  color:white;
  padding:15px;
}

.wrapper {
  display:flex;
  height:90vh;
}

.left {
  width:40%;
  background:#f5f5f5;
  padding:10px;
  overflow:auto;
  position:relative;
}

.right {
  width:60%;
  padding:20px;
  overflow:auto;
}

input {
  width:100%;
  padding:8px;
}

#suggestions {
  position:absolute;
  background:white;
  width:95%;
  border:1px solid #ccc;
  max-height:250px;
  overflow:auto;
  display:none;
  z-index:1000;
}

.suggestion-item {
  padding:8px;
  cursor:pointer;
}
.suggestion-item:hover {
  background:#e6f0ff;
}

.card {
  padding:10px;
  border-bottom:1px solid #ccc;
  cursor:pointer;
}
.card:hover {
  background:#e6f0ff;
}
</style>

</head>

<body>

<header>
<h2>Accessibility Tool</h2>
</header>

<div class="wrapper">

<div class="left">

<input id="searchBox" placeholder="Search..." autocomplete="off">

<div id="suggestions"></div>

<br>

<div id="resultList"></div>

</div>

<div class="right" id="previewPanel">
<h3>Select an issue</h3>
</div>

</div>

<script>

let issues = [];
let filtered = [];

/* ✅ LOAD */
window.onload = function(){

  let saved = localStorage.getItem("repoData");

  if(!saved){
    previewPanel.innerHTML = "<h3>Please import Excel first</h3>";
    return;
  }

  issues = JSON.parse(saved);
  filtered = issues;

  renderList();
  showDetails(filtered[0]);
};

/* ✅ SEARCH */
searchBox.addEventListener("input", function(){

  let q = this.value.toLowerCase();

  filtered = issues.filter(i =>
    (i.issue + " " + i.description + " " + i.suggestion)
    .toLowerCase()
    .includes(q)
  );

  renderList();
  showSuggestions();
});

/* ✅ SUGGESTIONS (MATCH FILTERED LIST) */
function showSuggestions(){

  let box = document.getElementById("suggestions");
  let q = searchBox.value;

  if(!q){
    box.style.display = "none";
    return;
  }

  box.innerHTML="";

  filtered.forEach(i => {

    let div = document.createElement("div");
    div.className="suggestion-item";

    div.innerText = i.issue;

    div.onclick = function(){
      searchBox.value = i.issue;
      box.style.display="none";

      filtered=[i];
      renderList();
      showDetails(i);
    };

    box.appendChild(div);
  });

  box.style.display = filtered.length ? "block" : "none";
}

/* ✅ LIST */
function renderList(){

  resultList.innerHTML="";

  filtered.forEach(i => {

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML = "<b>" + i.issue + "</b>";

    div.onclick = () => showDetails(i);

    resultList.appendChild(div);
  });
}

/* ✅ DETAILS PANEL */
function showDetails(i){

  previewPanel.innerHTML = `
    <h2>${i.issue}</h2>

    <p><b>Type:</b> ${i.type || "-"}</p>
    <p><b>Severity:</b> ${i.severity || "-"}</p>
    <p><b>WCAG:</b> ${i.wcagLevel || "-"} | ${i.wcagSC || "-"}</p>

    <hr>

    <h3>Description</h3>
    <p>${i.description} ${i.rationale}</p>

    <h3>Suggestion</h3>
    <p>${i.suggestion}</p>
  `;
}

</script>

</body>
</html>
