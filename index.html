<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">

<style>
body { font-family: Arial; margin:0; }

header {
  background:#1f3c88;
  color:white;
  padding:15px;
}

.wrapper {
  display:flex;
  height:90vh;
}

.left {
  width:40%;
  background:#f5f5f5;
  padding:10px;
  overflow:auto;
  position:relative;
}

.right {
  width:60%;
  padding:20px;
  overflow:auto;
}

input, select {
  width:100%;
  padding:8px;
  margin-bottom:8px;
}

.card {
  padding:10px;
  border-bottom:1px solid #ccc;
  cursor:pointer;
}
.card:hover { background:#e6f0ff; }

pre {
  background:#f4f4f4;
  padding:10px;
  border-radius:6px;
  overflow:auto;
}
</style>

</head>

<body>

<header>
<h2>Accessibility Tool</h2>
</header>

<div class="wrapper">

<div class="left">

<input id="searchBox" placeholder="Search...">

<select id="typeFilter">
  <option value="">All Types</option>
</select>

<select id="severityFilter">
  <option value="">All Severity</option>
</select>

<select id="wcagFilter">
  <option value="">All WCAG Level</option>
</select>

<div id="resultList"></div>

</div>

<div class="right" id="previewPanel">
<h3>Select an issue</h3>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script>

let issues = [];
let filtered = [];

/* ✅ escape HTML */
function escapeHTML(text){
  if(!text) return "";
  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* ✅ SMART FORMAT CONTENT */
function formatContent(text){

  if(!text) return "";

  text = escapeHTML(text);

  if(text.includes("Code Snippet:")){
    let parts = text.split("Code Snippet:");

    return `
      <p>${parts[0]}</p>
      <b>Code Snippet:</b>
      <pre><code class="language-html">${parts[1]}</code></pre>
    `;
  }

  let htmlMatch = text.match(/(&lt;.*&gt;)/);

  if(htmlMatch){
    let before = text.substring(0, htmlMatch.index);
    let code = text.substring(htmlMatch.index);

    return `
      <p>${before}</p>
      <pre><code class="language-html">${code}</code></pre>
    `;
  }

  return `<p>${text}</p>`;
}

/* ✅ LOAD DATA */
window.onload = function(){

  let saved = localStorage.getItem("repoData");

  if(!saved){
    previewPanel.innerHTML = "<h3>Please import Excel first</h3>";
    return;
  }

  issues = JSON.parse(saved);

  populateFilters();
  applyFilters();
};

/* ✅ POPULATE FILTER DROPDOWNS */
function populateFilters(){

  let types = [...new Set(issues.map(i=>i.type).filter(Boolean))];
  let severity = [...new Set(issues.map(i=>i.severity).filter(Boolean))];
  let wcag = [...new Set(issues.map(i=>i.wcagLevel).filter(Boolean))];

  typeFilter.innerHTML = '<option value="">All Types</option>';
  severityFilter.innerHTML = '<option value="">All Severity</option>';
  wcagFilter.innerHTML = '<option value="">All WCAG Level</option>';

  types.forEach(v=>{
    let opt=document.createElement("option");
    opt.value=v;
    opt.textContent=v;
    typeFilter.appendChild(opt);
  });

  severity.forEach(v=>{
    let opt=document.createElement("option");
    opt.value=v;
    opt.textContent=v;
    severityFilter.appendChild(opt);
  });

  wcag.forEach(v=>{
    let opt=document.createElement("option");
    opt.value=v;
    opt.textContent=v;
    wcagFilter.appendChild(opt);
  });
}

/* ✅ APPLY ALL FILTERS */
function applyFilters(){

  let q = searchBox.value.toLowerCase();
  let t = typeFilter.value;
  let s = severityFilter.value;
  let w = wcagFilter.value;

  filtered = issues.filter(i => {

    let matchSearch =
      (i.issue + " " + i.description + " " + i.rationale + " " + i.suggestion)
      .toLowerCase().includes(q);

    let matchType = t ? i.type === t : true;
    let matchSeverity = s ? i.severity === s : true;
    let matchWCAG = w ? i.wcagLevel === w : true;

    return matchSearch && matchType && matchSeverity && matchWCAG;
  });

  renderList();

  if(filtered.length){
    showDetails(filtered[0]);
  } else {
    previewPanel.innerHTML = "<h3>No results found</h3>";
  }
}

/* ✅ EVENTS */
searchBox.addEventListener("input", applyFilters);
typeFilter.addEventListener("change", applyFilters);
severityFilter.addEventListener("change", applyFilters);
wcagFilter.addEventListener("change", applyFilters);

/* ✅ LIST */
function renderList(){

  resultList.innerHTML="";

  filtered.forEach(i => {

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML="<b>"+i.issue+"</b>";

    div.onclick=()=>showDetails(i);

    resultList.appendChild(div);
  });
}

/* ✅ DETAILS */
function showDetails(i){

  previewPanel.innerHTML=`
    <h2>${i.issue}</h2>

    <p><b>Type:</b> ${i.type}</p>
    <p><b>Severity:</b> ${i.severity}</p>
    <p><b>WCAG:</b> ${i.wcagLevel} | ${i.wcagSC}</p>

    <hr>

    <h3>Description</h3>
    ${formatContent(i.description)}

    <h3>Rationale</h3>
    <p>${escapeHTML(i.rationale)}</p>

    <h3>Suggestion</h3>
    ${formatContent(i.suggestion)}
  `;

  document.querySelectorAll("pre code").forEach(block=>{
    hljs.highlightElement(block);
  });
}

</script>

</body>
</html>
