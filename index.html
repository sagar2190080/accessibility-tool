<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<style>
body { font-family: Arial; margin:0; }

header {
  background:#1f3c88;
  color:white;
  padding:15px;
}

.wrapper {
  display:flex;
  height:90vh;
}

.left {
  width:40%;
  background:#f5f5f5;
  padding:10px;
  overflow:auto;
  position:relative;
}

.right {
  width:60%;
  padding:20px;
  overflow:auto;
}

/* search */
input {
  width:100%;
  padding:8px;
}

/* suggestions */
#suggestions {
  position:absolute;
  background:white;
  width:95%;
  border:1px solid #ccc;
  max-height:250px;
  overflow:auto;
  display:none;
  z-index:1000;
}

.suggestion-item {
  padding:8px;
  cursor:pointer;
}
.suggestion-item:hover {
  background:#e6f0ff;
}

/* list */
.card {
  padding:10px;
  border-bottom:1px solid #ccc;
  cursor:pointer;
}
.card:hover {
  background:#e6f0ff;
}
</style>

</head>

<body>

<header>
<h2>Accessibility Tool</h2>
</header>

<div class="wrapper">

<div class="left">

<input id="searchBox" placeholder="Search..." autocomplete="off">
<div id="suggestions"></div>

<br>

<div id="resultList"></div>

</div>

<div class="right" id="previewPanel">
<h3>Select an issue</h3>
</div>

</div>

<script>

let issues = [];
let filtered = [];

/* ✅ AUTO CLEAN FUNCTION */
function cleanText(text){
  if(!text) return "";

  return text
    .replace(/□/g, "'")
    .replace(/\(\.\.\.\)/g, "")
    .replace(/\.{2,}/g, "")
    .replace(/;/g, "")
    .replace(/\s+/g, " ")
    .replace(/[\r\n]+/g, " ")
    .trim();
}

/* ✅ LOAD DATA */
window.onload = function(){

  let saved = localStorage.getItem("repoData");

  if(!saved){
    previewPanel.innerHTML = "<h3>Please upload Excel first</h3>";
    return;
  }

  issues = JSON.parse(saved);
  filtered = issues;

  renderList();

  if(filtered.length){
    showDetails(filtered[0]);
  }
};

/* ✅ SEARCH */
searchBox.addEventListener("input", function(){

  let q = this.value.toLowerCase().trim();

  filtered = issues.filter(i =>
    JSON.stringify(i).toLowerCase().includes(q)
  );

  renderList();
  showSuggestions();
});

/* ✅ SUGGESTIONS (SAME AS LEFT PANEL) */
function showSuggestions(){

  let box = document.getElementById("suggestions");

  let q = searchBox.value.trim();

  if(!q){
    box.style.display="none";
    return;
  }

  box.innerHTML="";

  filtered.forEach(i => {

    let div = document.createElement("div");
    div.className="suggestion-item";

    let text = i["Issue"] || i.issue || "No title";

    div.innerText = text;

    div.onclick = function(){

      searchBox.value = text;
      box.style.display="none";

      filtered = [i];
      renderList();
      showDetails(i);
    };

    box.appendChild(div);
  });

  box.style.display = filtered.length ? "block" : "none";
}

/* ✅ LIST */
function renderList(){

  resultList.innerHTML="";

  filtered.forEach(i => {

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML = "<b>" + (i["Issue"] || i.issue || "No title") + "</b>";

    div.onclick = ()=> showDetails(i);

    resultList.appendChild(div);
  });
}

/* ✅ DETAILS PANEL */
function showDetails(i){

  let issue = i["Issue"] || i.issue || "-";
  let type = i["Type of Issue"] || i.type || "-";
  let severity = i["Severity"] || i.severity || "-";

  let wcagLevel = i["wcagLevel"] || "-";
  let wcagSC = i["wcagSC"] || "-";

  let rawDesc =
    (i["Issue Description"] || i.description || "") + " " +
    (i["Rationale"] || i.rationale || "");

  let rawSug = i["Suggestion"] || i.suggestion || "";

  let description = cleanText(rawDesc);
  let suggestion = cleanText(rawSug);

  previewPanel.innerHTML = `
    <h2>${issue}</h2>

    <p><b>Type:</b> ${type}</p>
    <p><b>Severity:</b> ${severity}</p>
    <p><b>WCAG:</b> ${wcagLevel} | ${wcagSC}</p>

    <hr>

    <h3>Description</h3>
    <p>${description}</p>

    <h3>Suggestion</h3>
    <p>${suggestion}</p>
  `;
}

</script>

</body>
</html>
