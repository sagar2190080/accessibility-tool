<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9;}
header {
  background:#1f3c88;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}
.dashboard {
  display:flex;
  gap:10px;
  padding:10px;
}
.stat {
  flex:1;
  padding:10px;
  color:white;
  text-align:center;
  border-radius:5px;
}
.total { background:#007bff; }
.high { background:#dc3545; }
.medium { background:#ffc107; color:black; }
.low { background:#28a745; }

.wrapper { display:flex; height:85vh; }
.left { width:40%; overflow:auto; padding:10px; background:#fff; }
.right { width:60%; padding:20px; }

.card {
  padding:10px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
}
.card:hover { background:#eef; }

.code { background:#eee; padding:10px; }

</style>
</head>

<body>

<header>
  <div>Accessibility Tool 🚀</div>
</header>

<div class="dashboard">
  <div id="totalBox" class="stat total"></div>
  <div id="highBox" class="stat high"></div>
  <div id="mediumBox" class="stat medium"></div>
  <div id="lowBox" class="stat low"></div>
</div>

<div class="wrapper">

<div class="left">
<input id="searchBox" placeholder="Search..." style="width:100%;margin-bottom:10px;">
<div id="resultList"></div>
</div>

<div class="right" id="previewPanel"></div>

</div>

<script>

let issues = [];
let filtered = [];

/* ✅ SMART FIELD FINDER (REAL FIX) */
function findField(obj, keywords){

  let keys = Object.keys(obj);

  for(let key of keys){

    let lower = key.toLowerCase();

    for(let k of keywords){
      if(lower.includes(k)){
        return obj[key];
      }
    }

  }

  return "";
}

/* ✅ MAP DATA CORRECTLY */
function mapData(obj){
  return obj; // ✅ DATA IS ALREADY CLEAN
}
/* ✅ LOAD */
window.onload=function(){

  fetch("./repository.json")
  .then(r=>r.json())
  .then(data=>{

    issues = data.map(mapData);  // ✅ CORE FIX HERE
    filtered = issues;

    updateDashboard();
    render();

    if(filtered.length){
      showPreview(filtered[0]);
    }

  });
};

/* DASHBOARD */
function updateDashboard(){

  totalBox.innerText="Total: "+issues.length;
  highBox.innerText="High: "+issues.filter(i=>i.severity==="High").length;
  mediumBox.innerText="Medium: "+issues.filter(i=>i.severity==="Medium").length;
  lowBox.innerText="Low: "+issues.filter(i=>i.severity==="Low").length;
}

/* SEARCH */
searchBox.addEventListener("input",function(){

  let q=this.value.toLowerCase();

  filtered = issues.filter(i =>

    (i.issue+" "+i.description+" "+i.suggestion)
    .toLowerCase()
    .includes(q)

  );

  render();

  if(filtered.length){
    showPreview(filtered[0]);
  } else {
    previewPanel.innerHTML="<h3>No results</h3>";
  }
});

/* LIST */
function render(){

  resultList.innerHTML="";

  filtered.forEach(i=>{

    let div=document.createElement("div");
    div.className="card";
    div.innerHTML="<b>"+(i.issue || "No title")+"</b>";

    div.onclick=()=>showPreview(i);

    resultList.appendChild(div);
  });
}

/* PREVIEW */
function showPreview(i){

  previewPanel.innerHTML=`
    <h2>${i.issue}</h2>

    <p><b>Type:</b> ${i.type}</p>
    <p><b>Severity:</b> ${i.severity}</p>
    <p><b>WCAG:</b> ${i.wcagLevel} | ${i.wcagSC}</p>

    <p><b>Description:</b></p>
    <p>${i.description}</p>

    <p><b>Suggestion:</b></p>
    <p>${i.suggestion}</p>
  `;
}

</script>

</body>
</html>
