<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<!-- ✅ Highlight.js CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">

<style>
body { font-family: Arial; margin:0; }

header {
  background:#1f3c88;
  color:white;
  padding:15px;
}

.wrapper {
  display:flex;
  height:90vh;
}

.left {
  width:40%;
  background:#f5f5f5;
  padding:10px;
  overflow:auto;
  position:relative;
}

.right {
  width:60%;
  padding:20px;
  overflow:auto;
}

input {
  width:100%;
  padding:8px;
}

#suggestions {
  position:absolute;
  background:white;
  width:95%;
  border:1px solid #ccc;
  max-height:250px;
  overflow:auto;
  display:none;
}

.suggestion-item {
  padding:8px;
  cursor:pointer;
}
.suggestion-item:hover {
  background:#e6f0ff;
}

.card {
  padding:10px;
  border-bottom:1px solid #ccc;
  cursor:pointer;
}
.card:hover {
  background:#e6f0ff;
}

/* ✅ code block */
pre {
  background:#f4f4f4;
  padding:10px;
  border-radius:6px;
  overflow:auto;
}

/* ✅ inline code */
.inline-code {
  background:#eee;
  padding:2px 6px;
  font-family: monospace;
  border-radius:4px;
}
</style>

</head>

<body>

<header>
<h2>Accessibility Tool</h2>
</header>

<div class="wrapper">

<div class="left">
<input id="searchBox" placeholder="Search...">
<div id="suggestions"></div>

<br>
<div id="resultList"></div>
</div>

<div class="right" id="previewPanel">
<h3>Select an issue</h3>
</div>

</div>

<!-- ✅ Highlight.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script>

let issues = [];
let filtered = [];

/* ✅ escape HTML */
function escapeHTML(text){
  if(!text) return "";
  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* ✅ FINAL SMART FORMAT FUNCTION */
function formatContent(text){

  if(!text) return "";

  text = escapeHTML(text);

  /* ✅ detect full code snippet */
  if(text.includes("Code Snippet:")){
    let parts = text.split("Code Snippet:");

    return `
      <p>${parts[0]}</p>
      <b>Code Snippet:</b>
      <pre><code class="language-html">${parts[1]}</code></pre>
    `;
  }

  /* ✅ detect inline HTML and highlight inline */
  return text.replace(/(&lt;[^&]+&gt;)/g, function(match){
    return `<span class="inline-code">${match}</span>`;
  });
}

/* LOAD */
window.onload = function(){

  let saved = localStorage.getItem("repoData");

  if(!saved){
    previewPanel.innerHTML = "<h3>Please import Excel first</h3>";
    return;
  }

  issues = JSON.parse(saved);
  filtered = issues;

  renderList();
  showDetails(filtered[0]);
};

/* SEARCH */
searchBox.addEventListener("input", function(){

  let q = this.value.toLowerCase();

  filtered = issues.filter(i =>
    (i.issue + " " + i.description + " " + i.rationale + " " + i.suggestion)
    .toLowerCase()
    .includes(q)
  );

  renderList();
  showSuggestions();
});

/* suggestions */
function showSuggestions(){

  if(!searchBox.value){
    suggestions.style.display="none";
    return;
  }

  suggestions.innerHTML="";

  filtered.forEach(i => {

    let div=document.createElement("div");
    div.className="suggestion-item";
    div.innerText = i.issue;

    div.onclick=()=>{
      searchBox.value=i.issue;
      suggestions.style.display="none";

      filtered=[i];
      renderList();
      showDetails(i);
    };

    suggestions.appendChild(div);
  });

  suggestions.style.display="block";
}

/* list */
function renderList(){

  resultList.innerHTML="";

  filtered.forEach(i => {

    let div=document.createElement("div");
    div.className="card";
    div.innerHTML="<b>"+i.issue+"</b>";

    div.onclick=()=>showDetails(i);

    resultList.appendChild(div);
  });
}

/* details */
function showDetails(i){

  previewPanel.innerHTML=`
    <h2>${i.issue}</h2>

    <p><b>Type:</b> ${i.type}</p>
    <p><b>Severity:</b> ${i.severity}</p>
    <p><b>WCAG:</b> ${i.wcagLevel} | ${i.wcagSC}</p>

    <hr>

    <h3>Description</h3>
    <div>${formatContent(i.description)}</div>

    <h3>Rationale</h3>
    <p>${escapeHTML(i.rationale)}</p>

    <h3>Suggestion</h3>
    <div>${formatContent(i.suggestion)}</div>
  `;

  /* ✅ apply syntax highlight */
  document.querySelectorAll("pre code").forEach(block => {
    hljs.highlightElement(block);
  });
}

</script>

</body>
</html>
