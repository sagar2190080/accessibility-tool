<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<style>
body {
  font-family: Arial;
  margin:0;
}

header {
  background:#1f3c88;
  color:white;
  padding:15px;
}

/* LAYOUT */
.wrapper {
  display:flex;
  height:90vh;
}

.left {
  width:40%;
  background:#f5f5f5;
  padding:10px;
  overflow:auto;
  position:relative;
}

.right {
  width:60%;
  padding:20px;
  overflow:auto;   /* ✅ FIX OVERLAP */
}

/* LIST */
.card {
  padding:10px;
  border-bottom:1px solid #ccc;
  cursor:pointer;
}
.card:hover {
  background:#e6f0ff;
}

/* SEARCH */
input {
  width:100%;
  padding:8px;
  margin-bottom:5px;
}

/* ✅ AUTOSUGGEST BOX */
#suggestions {
  position:absolute;
  background:white;
  width:95%;
  border:1px solid #ccc;
  max-height:200px;
  overflow:auto;
  display:none;
  z-index:1000;
}

.suggestion-item {
  padding:8px;
  cursor:pointer;
}
.suggestion-item:hover {
  background:#eef;
}

/* TEXT */
h2,h3 { margin-top:10px; }
</style>
</head>

<body>

<header>
<h2>Accessibility Tool</h2>
</header>

<div class="wrapper">

<div class="left">

<input id="searchBox" placeholder="Search...">
<div id="suggestions"></div>

<div id="resultList"></div>

</div>

<div class="right" id="previewPanel">
<h3>Select an issue</h3>
</div>

</div>

<script>

let issues = [];
let filtered = [];

/* ✅ LOAD DATA */
window.onload = function(){

  let saved = localStorage.getItem("repoData");

  if(!saved){
    previewPanel.innerHTML = "<h3>Please import Excel first</h3>";
    return;
  }

  issues = JSON.parse(saved);
  filtered = issues;

  renderList();
  if(filtered.length){
    showDetails(filtered[0]);
  }
};

/* ✅ SMART VALUE GETTER (FIX WCAG ISSUE) */
function getVal(obj, key1, key2){
  return obj[key1] || obj[key2] || "-";
}

/* ✅ SEARCH + SUGGESTIONS */
searchBox.addEventListener("input", function(){

  let q = this.value.toLowerCase().trim();

  /* FILTER */
  filtered = issues.filter(i =>
    JSON.stringify(i).toLowerCase().includes(q)
  );

  renderList();

  /* ✅ SUGGESTIONS FIXED */
  showSuggestions(q);

});

/* ✅ SUGGESTION FUNCTION */
function showSuggestions(q){

  let box = document.getElementById("suggestions");

  if(!q){
    box.style.display="none";
    return;
  }

  let matches = issues
    .filter(i =>
      (i["Issue"] || i.issue || "").toLowerCase().includes(q)
    )
    .slice(0,5);  // top 5

  box.innerHTML = "";

  matches.forEach(i => {

    let div = document.createElement("div");
    div.className="suggestion-item";
    div.innerText = i["Issue"] || i.issue;

    div.onclick = function(){
      searchBox.value = div.innerText;
      box.style.display="none";

      filtered = [i];
      renderList();
      showDetails(i);
    };

    box.appendChild(div);
  });

  box.style.display = matches.length ? "block" : "none";
}

/* ✅ LIST */
function renderList(){

  resultList.innerHTML="";

  filtered.forEach(i => {

    let div = document.createElement("div");
    div.className="card";

    div.innerHTML = "<b>" + (i["Issue"] || i.issue || "No title") + "</b>";

    div.onclick = ()=> showDetails(i);

    resultList.appendChild(div);
  });
}

/* ✅ DETAILS */
function showDetails(i){

  let issue = i["Issue"] || i.issue;
  let type = getVal(i,"Type of Issue","type");
  let severity = getVal(i,"Severity","severity");

  /* ✅ WCAG FIX */
  let wcagLevel = getVal(i,"WCAG 2.0 Conformance Level","wcagLevel");
  let wcagSC = getVal(i,"WCAG 2.0","wcagSC");

  let description =
    (getVal(i,"Issue Description","description") + " " +
     getVal(i,"Rationale","rationale")).trim();

  let suggestion = getVal(i,"Suggestion","suggestion");

  previewPanel.innerHTML = `
    <h2>${issue}</h2>

    <p><b>Type:</b> ${type}</p>
    <p><b>Severity:</b> ${severity}</p>
    <p><b>WCAG:</b> ${wcagLevel} | ${wcagSC}</p>

    <hr>

    <h3>Description</h3>
    <p>${description}</p>

    <h3>Suggestion</h3>
    <p>${suggestion}</p>
  `;
}

</script>

</body>
</html>
