<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: "Segoe UI";
  margin:0;
  background:#f4f6f9;
}

/* HEADER */
header {
  background:#1f3c88;
  color:white;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

/* DASHBOARD */
.dashboard {
  display:flex;
  gap:10px;
  padding:10px;
}

.card-box {
  flex:1;
  background:white;
  padding:10px;
  border-radius:8px;
  text-align:center;
  font-weight:bold;
}

.high { border-top:4px solid #dc3545; }
.medium { border-top:4px solid #ffc107; }
.low { border-top:4px solid #28a745; }

/* LAYOUT */
.wrapper { display:flex; height:80vh; }

.left {
  width:35%;
  background:white;
  border-right:1px solid #ddd;
  display:flex;
  flex-direction:column;
}

.right {
  width:65%;
  padding:20px;
  overflow:auto;
}

/* FILTERS */
.filters {
  padding:10px;
  border-bottom:1px solid #eee;
}

input, select, button {
  width:100%;
  padding:8px;
  margin-bottom:6px;
  border-radius:6px;
}

/* LIST */
.card {
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.card:hover { background:#f0f4ff; }

/* META ROW */
.meta-row {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin:10px 0;
}

.meta-item {
  padding:6px 12px;
  border-radius:20px;
  font-size:13px;
  color:white;
  font-weight:bold;
}

.type { background:#007bff; }
.sev-high { background:#dc3545; }
.sev-medium { background:#ffc107; color:black; }
.sev-low { background:#28a745; }
.wcag { background:#6f42c1; }

/* SECTIONS */
.section { margin-top:20px; }
.section h3 { margin-bottom:5px; }

/* ✅ CODE BLOCK */
pre {
  background:#f6f8fa;
  padding:12px;
  border-radius:8px;
  overflow:auto;
  white-space:pre-wrap;
}
</style>

</head>

<body>

<header>Accessibility Tool</header>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="card-box">Total<br><span id="totalCount">0</span></div>
  <div class="card-box high">High<br><span id="highCount">0</span></div>
  <div class="card-box medium">Medium<br><span id="mediumCount">0</span></div>
  <div class="card-box low">Low<br><span id="lowCount">0</span></div>
</div>

<div class="wrapper">

<!-- LEFT PANEL -->
<div class="left">

<div class="filters">

<input id="searchBox" placeholder="Search...">

<select id="typeFilter"><option value="">All Types</option></select>
<select id="severityFilter"><option value="">All Severity</option></select>
<select id="wcagFilter"><option value="">All WCAG</option></select>

<button onclick="exportToExcel()">⬇ Export Filtered Data</button>

</div>

<div id="resultList"></div>

</div>

<!-- RIGHT PANEL -->
<div class="right" id="previewPanel">
<h3>Select an issue</h3>
</div>

</div>

<script>

let issues = [];
let filtered = [];

/* ESCAPE */
function escapeHTML(text){
  return text?.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") || "";
}

/* ✅ FIXED CODE SNIPPET HANDLING */
function formatContent(text){

  if(!text) return "<p>-</p>";

  let escaped = escapeHTML(text);

  // Case 1: Explicit marker
  if(escaped.includes("Code Snippet:")){
    let parts = escaped.split("Code Snippet:");

    return `
      <p>${parts[0]}</p>
      <b>Code Snippet:</b>
      <pre><code class="language-html">${parts[1].trim()}</code></pre>
    `;
  }

  // ✅ Case 2: detect html start
  let htmlStart = escaped.search(/&lt;[a-zA-Z]/);

  if(htmlStart !== -1){
    let textPart = escaped.substring(0, htmlStart);
    let codePart = escaped.substring(htmlStart);

    return `
      ${textPart ? `<p>${textPart.trim()}</p>` : ""}
      <pre><code class="language-html">${codePart.trim()}</code></pre>
    `;
  }

  return `<p>${escaped}</p>`;
}

/* LOAD */
window.onload = function(){

  let data = localStorage.getItem("repoData");

  if(!data){
    previewPanel.innerHTML="<h3>Please import Excel first</h3>";
    return;
  }

  issues = JSON.parse(data);

  populateFilters();
  applyFilters();
  updateDashboard();
}

/* DASHBOARD */
function updateDashboard(){

  totalCount.innerText = issues.length;

  highCount.innerText = issues.filter(i=>i.severity==="High").length;
  mediumCount.innerText = issues.filter(i=>i.severity==="Medium").length;
  lowCount.innerText = issues.filter(i=>i.severity==="Low").length;
}

/* FILTERS */
function populateFilters(){

  [...new Set(issues.map(i=>i.type))].forEach(v=>{
    if(v) typeFilter.innerHTML += `<option>${v}</option>`;
  });

  [...new Set(issues.map(i=>i.severity))].forEach(v=>{
    if(v) severityFilter.innerHTML += `<option>${v}</option>`;
  });

  [...new Set(issues.map(i=>i.wcagLevel))].forEach(v=>{
    if(v) wcagFilter.innerHTML += `<option>${v}</option>`;
  });
}

/* APPLY FILTERS */
function applyFilters(){

  let q = searchBox.value.toLowerCase();
  let t = typeFilter.value;
  let s = severityFilter.value;
  let w = wcagFilter.value;

  filtered = issues.filter(i => {

    let txt = (i.issue + i.description + i.rationale + i.suggestion).toLowerCase();

    return txt.includes(q) &&
      (!t || i.type===t) &&
      (!s || i.severity===s) &&
      (!w || i.wcagLevel===w);
  });

  renderList();

  if(filtered.length) showDetails(filtered[0]);
}

/* EVENTS */
searchBox.oninput = applyFilters;
typeFilter.onchange = applyFilters;
severityFilter.onchange = applyFilters;
wcagFilter.onchange = applyFilters;

/* LIST */
function renderList(){

  resultList.innerHTML="";

  filtered.forEach(i => {

    let d=document.createElement("div");
    d.className="card";
    d.innerHTML="<b>"+i.issue+"</b>";

    d.onclick=()=>showDetails(i);

    resultList.appendChild(d);
  });
}

/* DETAILS */
function showDetails(i){

  previewPanel.innerHTML=`
    <h2>${i.issue}</h2>

    <div class="meta-row">

      <div class="meta-item type">Type: ${i.type}</div>

      <div class="meta-item ${
        i.severity==="High"?"sev-high":
        i.severity==="Medium"?"sev-medium":"sev-low"
      }">
        Severity: ${i.severity}
      </div>

      <div class="meta-item wcag">
        WCAG: ${i.wcagLevel} | ${i.wcagSC}
      </div>

    </div>

    <hr>

    <div class="section">
      <h3>Description</h3>
      ${formatContent(i.description)}
    </div>

    <div class="section">
      <h3>Rationale</h3>
      <p>${escapeHTML(i.rationale)}</p>
    </div>

    <div class="section">
      <h3>Suggestion</h3>
      ${formatContent(i.suggestion)}
    </div>
  `;

  document.querySelectorAll("pre code").forEach(block=>{
    hljs.highlightElement(block);
  });
}

/* EXPORT */
function exportToExcel(){

  let data = filtered.map(i=>({
    Issue:i.issue,
    Type:i.type,
    Severity:i.severity,
    WCAG_Level:i.wcagLevel,
    WCAG_SC:i.wcagSC
  }));

  let ws = XLSX.utils.json_to_sheet(data);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Issues");

  XLSX.writeFile(wb, "Filtered_Issues.xlsx");
}

</script>

</body>
</html>
