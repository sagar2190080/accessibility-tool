<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

/* BASE */
body {
  font-family: "Segoe UI";
  margin:0;
  background:#f5f7fb;
}

header {
  background:#1f3c88;
  color:white;
  padding:15px;
  font-size:20px;
  font-weight:600;
}

/* DASHBOARD */
.dashboard {
  display:flex;
  gap:15px;
  padding:15px;
}

.card-box {
  flex:1;
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.card-box span {
  font-size:20px;
}

.high { border-top:4px solid #e53935; }
.medium { border-top:4px solid #fbc02d; }
.low { border-top:4px solid #43a047; }

/* LAYOUT */
.wrapper { display:flex; height:calc(100vh - 130px); }

.left {
  width:32%;
  background:white;
  border-right:1px solid #eee;
  display:flex;
  flex-direction:column;
}

.right {
  width:68%;
  padding:20px;
  overflow:auto;
}

/* FILTERS */
.filters {
  padding:12px;
  border-bottom:1px solid #f0f0f0;
}

input, select, button {
  width:100%;
  padding:8px;
  margin-bottom:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

/* LIST */
.card {
  padding:12px;
  border-bottom:1px solid #f1f1f1;
  cursor:pointer;
}
.card:hover { background:#f4f7ff; }

/* META */
.meta-row {
  display:flex;
  gap:8px;
  margin:12px 0;
}

.meta-item {
  padding:5px 10px;
  border-radius:16px;
  font-size:12px;
  color:white;
}

.type { background:#1976d2; }
.sev-high { background:#e53935; }
.sev-medium { background:#fbc02d; color:black; }
.sev-low { background:#43a047; }
.wcag { background:#6a1b9a; }

/* SECTION */
.section { margin-top:20px; }

/* ✅ CLEAN CODE BLOCK */
.code-wrapper {
  position:relative;
  margin-top:10px;
}

.copy-btn {
  position:absolute;
  right:10px;
  top:10px;
  font-size:12px;
  padding:4px 8px;
  border:none;
  background:#333;
  color:white;
  border-radius:4px;
  cursor:pointer;
  opacity:0.8;
}

.copy-btn:hover { opacity:1; }

pre {
  background:#fafbfc;
  border:1px solid #e1e4e8;
  padding:12px;
  border-radius:6px;
  overflow:auto;
  font-size:13px;
}

</style>

</head>

<body>

<header>Accessibility Tool</header>

<div class="dashboard">
  <div class="card-box">Total<br><span id="totalCount"></span></div>
  <div class="card-box high">High<br><span id="highCount"></span></div>
  <div class="card-box medium">Medium<br><span id="mediumCount"></span></div>
  <div class="card-box low">Low<br><span id="lowCount"></span></div>
</div>

<div class="wrapper">

<div class="left">

<div class="filters">
<input id="searchBox" placeholder="Search...">
<select id="typeFilter"><option value="">All Types</option></select>
<select id="severityFilter"><option value="">All Severity</option></select>
<select id="wcagFilter"><option value="">All WCAG</option></select>
<button onclick="exportToExcel()">⬇ Export</button>
</div>

<div id="resultList"></div>

</div>

<div class="right" id="previewPanel"></div>

</div>

<script>

let issues = [];
let filtered = [];

/* ESCAPE */
function escapeHTML(text){
  return text?.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") || "";
}

/* COPY */
function copyCode(btn){
  let code = btn.nextElementSibling.innerText;
  navigator.clipboard.writeText(code);
  btn.innerText="Copied";
  setTimeout(()=>btn.innerText="Copy",1000);
}

/* ✅ FIXED CLEAN FORMAT */
function formatContent(text){

  if(!text) return "<p>-</p>";

  let escaped = escapeHTML(text);
  let htmlStart = escaped.search(/&lt;[a-zA-Z]/);

  if(htmlStart !== -1){

    let textPart = escaped.substring(0, htmlStart);
    let codePart = escaped.substring(htmlStart);

    return `
      ${textPart ? `<p>${textPart.trim()}</p>` : ""}
      <div class="code-wrapper">
        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
        <pre><code class="language-html">${codePart}</code></pre>
      </div>
    `;
  }

  return `<p>${escaped}</p>`;
}

/* LOAD */
window.onload = function(){

  let data = localStorage.getItem("repoData");
  if(!data){
    previewPanel.innerHTML="<h3>Import data first</h3>";
    return;
  }

  issues = JSON.parse(data);

  populateFilters();
  applyFilters();
  updateDashboard();
}

/* DASHBOARD */
function updateDashboard(){
  totalCount.innerText = issues.length;
  highCount.innerText = issues.filter(i=>i.severity==="High").length;
  mediumCount.innerText = issues.filter(i=>i.severity==="Medium").length;
  lowCount.innerText = issues.filter(i=>i.severity==="Low").length;
}

/* FILTERS */
function populateFilters(){

  [...new Set(issues.map(i=>i.type))].forEach(v=>{
    if(v) typeFilter.innerHTML += `<option>${v}</option>`;
  });

  [...new Set(issues.map(i=>i.severity))].forEach(v=>{
    if(v) severityFilter.innerHTML += `<option>${v}</option>`;
  });

  [...new Set(issues.map(i=>i.wcagLevel))].forEach(v=>{
    if(v) wcagFilter.innerHTML += `<option>${v}</option>`;
  });
}

/* APPLY */
function applyFilters(){

  let q = searchBox.value.toLowerCase();
  let t = typeFilter.value;
  let s = severityFilter.value;
  let w = wcagFilter.value;

  filtered = issues.filter(i=>{
    let txt = (i.issue+i.description+i.rationale+i.suggestion).toLowerCase();
    return txt.includes(q) &&
      (!t||i.type===t) &&
      (!s||i.severity===s) &&
      (!w||i.wcagLevel===w);
  });

  renderList();
  if(filtered.length) showDetails(filtered[0]);
}

searchBox.oninput=applyFilters;
typeFilter.onchange=applyFilters;
severityFilter.onchange=applyFilters;
wcagFilter.onchange=applyFilters;

/* LIST */
function renderList(){
  resultList.innerHTML="";
  filtered.forEach(i=>{
    let d=document.createElement("div");
    d.className="card";
    d.innerHTML="<b>"+i.issue+"</b>";
    d.onclick=()=>showDetails(i);
    resultList.appendChild(d);
  });
}

/* DETAILS */
function showDetails(i){

  previewPanel.innerHTML=`
    <h2>${i.issue}</h2>

    <div class="meta-row">
      <div class="meta-item type">${i.type}</div>
      <div class="meta-item ${
        i.severity==="High"?"sev-high":
        i.severity==="Medium"?"sev-medium":"sev-low"}">
        ${i.severity}
      </div>
      <div class="meta-item wcag">${i.wcagLevel} | ${i.wcagSC}</div>
    </div>

    <div class="section">
      <h3>Description</h3>
      ${formatContent(i.description)}
    </div>

    <div class="section">
      <h3>Rationale</h3>
      <p>${escapeHTML(i.rationale)}</p>
    </div>

    <div class="section">
      <h3>Suggestion</h3>
      ${formatContent(i.suggestion)}
    </div>
  `;

  document.querySelectorAll("pre code").forEach(block=>{
    hljs.highlightElement(block);
  });
}

/* EXPORT */
function exportToExcel(){
  let ws = XLSX.utils.json_to_sheet(filtered);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Data");
  XLSX.writeFile(wb,"data.xlsx");
}

</script>

</body>
</html>
