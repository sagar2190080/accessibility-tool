<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessibility Tool</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9;}

header {
  background:#1f3c88;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* DASHBOARD */
.dashboard {
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
}
.stat {
  flex:1;
  padding:10px;
  border-radius:6px;
  color:white;
  text-align:center;
}
.total { background:#007bff; }
.high { background:#dc3545; }
.medium { background:#ffc107; color:black; }
.low { background:#28a745; }

/* FILTERS */
.filters {
  padding:10px;
  background:white;
  display:flex;
  gap:10px;
}

/* LAYOUT */
.wrapper { display:flex; height:75vh; }
.left { width:40%; background:white; padding:10px; overflow:auto; }
.right { width:60%; padding:20px; }

/* SEARCH */
.search-container { position:relative; }

#suggestions {
  position:absolute;
  width:100%;
  background:white;
  border:1px solid #ccc;
  max-height:200px;
  overflow:auto;
  display:none;
}

/* LIST */
.card {
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.card:hover { background:#eef2ff; }

/* GROUP */
.group-title {
  background:#ddd;
  padding:5px;
  font-weight:bold;
}

.code-block {
  background:#f4f4f4;
  padding:10px;
  font-family:monospace;
}

</style>
</head>

<body>

<header>
  <div>Accessibility Tool 🚀</div>
  <button onclick="generateReport()">Export Excel</button>
</header>

<div class="dashboard">
  <div id="totalBox" class="stat total">Total: 0</div>
  <div id="highBox" class="stat high">High: 0</div>
  <div id="mediumBox" class="stat medium">Medium: 0</div>
  <div id="lowBox" class="stat low">Low: 0</div>
</div>

<div class="filters">
  <select id="severityFilter">
    <option value="">All Severity</option>
    <option>High</option>
    <option>Medium</option>
    <option>Low</option>
  </select>

  <select id="levelFilter">
    <option value="">All WCAG</option>
    <option>A</option>
    <option>AA</option>
    <option>AAA</option>
  </select>

  <select id="viewMode">
    <option value="list">List View</option>
    <option value="group">WCAG Group View</option>
  </select>
</div>

<div class="wrapper">

<div class="left">

<div class="search-container">
  <input id="searchBox" placeholder="Search..." style="width:100%;">
</div>

<div id="resultList"></div>

</div>

<div class="right" id="previewPanel">
<h3>Loading...</h3>
</div>

</div>

<script>

let issues=[], filtered=[];

function safe(v){ return (v||"").toString(); }

/* LOAD */
window.onload=function(){

  fetch("./repository.json")
  .then(r=>r.json())
  .then(data=>{

    issues=data;
    filtered=data;

    updateDashboard();
    applyFilters();

  });
};

/* DASHBOARD */
function updateDashboard(){

  totalBox.innerText="Total: "+issues.length;
  highBox.innerText="High: "+issues.filter(i=>i.severity==="High").length;
  mediumBox.innerText="Medium: "+issues.filter(i=>i.severity==="Medium").length;
  lowBox.innerText="Low: "+issues.filter(i=>i.severity==="Low").length;
}

/* FILTER LOGIC */
document.getElementById("searchBox").addEventListener("input",applyFilters);
document.getElementById("severityFilter").addEventListener("change",applyFilters);
document.getElementById("levelFilter").addEventListener("change",applyFilters);
document.getElementById("viewMode").addEventListener("change",applyFilters);

function applyFilters(){

  let q = searchBox.value.toLowerCase();
  let sev = severityFilter.value;
  let lvl = levelFilter.value;

  filtered = issues.filter(i => {

    let matchText =
      safe(i.issue).toLowerCase().includes(q) ||
      safe(i.description).toLowerCase().includes(q);

    let matchSev = !sev || i.severity === sev;
    let matchLvl = !lvl || i.wcagLevel === lvl;

    return matchText && matchSev && matchLvl;
  });

  if(viewMode.value === "group"){
    renderGrouped();
  } else {
    renderList();
  }

  if(filtered.length > 0){
    showPreview(filtered[0]);
  } else {
    previewPanel.innerHTML="<h3>No results</h3>";
  }
}

/* LIST VIEW */
function renderList(){

  resultList.innerHTML="";

  filtered.forEach(i=>{

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`<b>${i.issue}</b>`;

    div.onclick=()=>showPreview(i);

    resultList.appendChild(div);
  });
}

/* WCAG GROUP VIEW */
function renderGrouped(){

  resultList.innerHTML="";

  let groups = {};

  filtered.forEach(i=>{
    let key = i.wcagSC || "Other";

    if(!groups[key]) groups[key]=[];
    groups[key].push(i);
  });

  for(let key in groups){

    let title=document.createElement("div");
    title.className="group-title";
    title.innerText="WCAG "+key;

    resultList.appendChild(title);

    groups[key].forEach(i=>{

      let div=document.createElement("div");
      div.className="card";
      div.innerText=i.issue;

      div.onclick=()=>showPreview(i);

      resultList.appendChild(div);
    });
  }
}

/* PREVIEW */
function showPreview(i){

  let parts = safe(i.description).split("Code Snippet:");

  previewPanel.innerHTML=`
    <h3>${i.issue}</h3>

    <p><b>Type:</b> ${i.type}</p>
    <p><b>Severity:</b> ${i.severity}</p>
    <p><b>WCAG:</b> ${i.wcagLevel} | ${i.wcagSC}</p>

    <p><b>Description:</b></p>
    <p>${parts[0]}</p>

    <p><b>Code Snippet:</b></p>
    <div class="code-block">${parts[1]||""}</div>

    <p><b>Suggestion:</b></p>
    <p>${safe(i.suggestion)}</p>
  `;
}

/* EXPORT */
function generateReport(){

  let rows=[["Issue","Severity","WCAG"]];

  issues.forEach(i=>{
    rows.push([i.issue,i.severity,i.wcagSC]);
  });

  let ws=XLSX.utils.aoa_to_sheet(rows);
  let wb=XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb,ws,"Report");

  XLSX.writeFile(wb,"Accessibility_Report.xlsx");
}

</script>

</body>
</html>
