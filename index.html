
<script>

/* ✅ SAFE FIELD ACCESSOR (KEY FIX) */
function getField(obj, key){
  return obj[key] 
      || obj[key.toLowerCase()] 
      || obj[key.toUpperCase()] 
      || "";
}

let issues=[], filtered=[];

/* ✅ LOAD DATA */
window.onload=function(){

  fetch("./repository.json")
  .then(res=>res.json())
  .then(data=>{

    issues=data.map(i=>({
      type: getField(i,"type"),
      issue: getField(i,"issue") || getField(i,"Issue"),
      description: getField(i,"description"),
      suggestion: getField(i,"suggestion"),
      severity: getField(i,"severity"),
      wcagLevel: getField(i,"wcagLevel"),
      wcagSC: getField(i,"wcagSC")
    }));

    filtered=issues;

    updateDashboard();
    render();

    if(filtered.length>0){
      showPreview(filtered[0]);
    }

  });
};

/* ✅ FIXED PREVIEW */
function showPreview(i){

  let parts=(i.description||"").split("Code Snippet:");

  previewPanel.innerHTML=`
    <h3>${i.issue}</h3>

    <p><b>Type:</b> ${i.type}</p>
    <p><b>Severity:</b> ${i.severity}</p>
    <p><b>WCAG:</b> ${i.wcagLevel} | ${i.wcagSC}</p>

    <p><b>Description:</b></p>
    <p>${(parts[0]||"").replace(/\n/g,"<br>")}</p>

    <p><b>Code Snippet:</b></p>
    <div class="code-block">${escapeHTML(parts[1]||"")}</div>

    <p><b>Suggestion:</b></p>
    <p>${i.suggestion}</p>
  `;
}

/* ✅ FIXED SEARCH */
searchBox.addEventListener("input",function(){

  let q=this.value.toLowerCase();

  filtered=issues.filter(i =>
    (i.issue||"").toLowerCase().includes(q) ||
    (i.description||"").toLowerCase().includes(q) ||
    (i.suggestion||"").toLowerCase().includes(q)
  );

  render();

  if(filtered.length>0){
    showPreview(filtered[0]);
  }
});

/* ✅ FIXED LIST */
function render(){

  resultList.innerHTML="";

  filtered.forEach(i=>{

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${i.issue}</b><br>
      <span class="badge badge-type">${i.type}</span>
      ${severityBadge(i.severity)}
    `;

    div.onclick=()=>showPreview(i);

    resultList.appendChild(div);
  });
}

/* ✅ SAFE HTML */
function escapeHTML(t){
  return (t||"")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

</script>
